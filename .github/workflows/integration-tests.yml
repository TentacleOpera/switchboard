name: Integration Tests

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Protocol catalog drift check
        run: node scripts/generate-protocol-catalog.js

      - name: Compile test outputs
        run: npm run compile-tests

      - name: Compile extension
        run: npm run compile

      - name: Protocol parity check
        run: npm run parity:check

      - name: Push-routing ratchet (Gap A)
        run: npm run push-routing:check

      - name: Verb return-contract ratchet
        run: npm run verb-returns:check

      - name: Claude mirror drift check
        run: npm run mirror:check

      - name: Run integration suite
        run: npm run test:integration:all

