<!-- Switchboard Kanban Board -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switchboard Kanban</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #000000;
            --panel-bg2: #0a0a0a;
            --border-color: #333333;
            --border-bright: #555555;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;

            --accent-teal: #3ddbd9;
            --accent-teal-dim: color-mix(in srgb, var(--accent-teal) 40%, transparent);
            --glow-teal: 0 0 10px color-mix(in srgb, var(--accent-teal) 50%, transparent);
            --accent-red: #da3633;
            --accent-orange: #d29922;
            --font-family: var(--vscode-font-family, 'Segoe UI', 'Roboto', sans-serif);
            --font-mono: var(--vscode-editor-font-family, 'Consolas', 'Courier New', monospace);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .kanban-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--panel-bg);
        }

        .kanban-title {
            flex: 1;
            min-width: 0;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-teal);
            text-shadow: var(--glow-teal);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .workspace-select {
            background: #0a0a0a;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.5px;
            padding: 4px 8px;
            min-width: 180px;
        }

        .controls-strip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-bottom: 1px solid var(--border-color);
            background: var(--panel-bg2);
            flex-wrap: wrap;
        }

        .settings-strip {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 16px;
            border-bottom: 1px solid var(--border-color);
            background: color-mix(in srgb, var(--panel-bg2) 85%, transparent);
            flex-wrap: wrap;
        }

        .cli-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.6px;
            color: var(--accent-teal);
            user-select: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        .cli-toggle input[type="checkbox"] {
            width: 12px;
            height: 12px;
            accent-color: var(--accent-teal);
            cursor: pointer;
        }

        .cli-toggle.is-off .toggle-label {
            color: var(--accent-orange);
        }

        .triggers-off-badge {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.6px;
            color: var(--accent-orange);
            border: 1px solid color-mix(in srgb, var(--accent-orange) 45%, transparent);
            background: color-mix(in srgb, var(--accent-orange) 15%, transparent);
            padding: 2px 6px;
            border-radius: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .strip-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }

        .strip-btn:hover {
            background: color-mix(in srgb, var(--accent-teal) 8%, transparent);
            border-color: var(--accent-teal-dim);
            color: var(--accent-teal);
        }

        .strip-btn.is-active {
            color: var(--accent-teal);
            border-color: var(--accent-teal-dim);
            box-shadow: var(--glow-teal);
            background: color-mix(in srgb, var(--accent-teal) 10%, transparent);
        }

        .btn-add-plan {
            background: color-mix(in srgb, var(--accent-teal) 15%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent-teal) 30%, transparent);
            color: var(--accent-teal);
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: bold;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
            box-shadow: var(--glow-teal);
        }

        .btn-add-plan:hover {
            background: var(--accent-teal);
            color: var(--panel-bg);
            box-shadow: 0 0 15px var(--accent-teal);
        }

        .btn-add-plan img {
            filter: sepia(1) saturate(3) hue-rotate(140deg) brightness(0.9);
            transition: filter 0.15s;
        }

        .btn-add-plan:hover img {
            filter: sepia(1) saturate(3) hue-rotate(140deg) brightness(1.2);
        }

        .btn-batch {
            background: color-mix(in srgb, var(--accent-teal) 12%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent-teal) 28%, transparent);
            color: var(--accent-teal);
            font-family: var(--font-mono);
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 0.6px;
            line-height: 1;
            min-height: 18px;
            padding: 3px 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }

        .btn-batch:hover {
            background: var(--accent-teal);
            color: var(--panel-bg);
            box-shadow: 0 0 12px color-mix(in srgb, var(--accent-teal) 60%, transparent);
        }

        .kanban-board {
            display: flex;
            gap: 12px;
            padding: 16px;
            padding-top: 36px;
            flex: 1;
            min-height: 0;
            overflow-x: auto;
        }

        .kanban-column {
            flex: 1;
            min-width: 220px;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border: 1px solid var(--vscode-contrastBorder, var(--border-color));
            border-radius: 4px;
            /* overflow: visible allows tooltips to escape the column without clipping */
            overflow: visible;
            position: relative;
            transition: z-index 0s;
        }

        .kanban-column:hover {
            /* Elevate hovered column to ensure tooltips appear above neighboring columns */
            z-index: 100;
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            background: var(--panel-bg2);
            min-height: 52px;
            /* Add radii here since parent no longer clips overflow */
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            z-index: 20;
        }

        .column-name {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .column-agent {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text-secondary);
            margin-top: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            letter-spacing: 0.5px;
            height: 13px;
        }

        .column-subline-spacer {
            height: 13px;
            margin-top: 2px;
        }

        .column-count {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--accent-teal);
            background: color-mix(in srgb, var(--accent-teal) 15%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent-teal) 30%, transparent);
            padding: 1px 6px;
            border-radius: 8px;
            min-width: 20px;
            text-align: center;
            box-shadow: var(--glow-teal);
        }

        .column-select {
            background: #0a0a0a;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            font-family: var(--font-mono);
            font-size: 9px;
            padding: 2px 4px;
            outline: none;
            margin-right: 8px;
            margin-left: auto;
        }

        .column-select:hover,
        .column-select:focus {
            border-color: var(--border-bright);
            outline: none;
        }

        .column-body {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
            min-height: 120px;
            transition: background 0.15s;
            /* Ensure body is below header/button area for tooltip stacking */
            z-index: 1;
        }

        .column-body.drag-over {
            background: color-mix(in srgb, var(--accent-teal) 6%, transparent);
            outline: 1px dashed var(--accent-teal-dim);
            outline-offset: -4px;
        }

        .kanban-card {
            /* Mix 12% teal into the top, fading to 4% teal at the bottom */
            background: linear-gradient(180deg, color-mix(in srgb, var(--accent-teal) 12%, var(--panel-bg2)) 0%, color-mix(in srgb, var(--accent-teal) 4%, var(--panel-bg)) 100%);
            border: 1px solid var(--vscode-contrastBorder, var(--border-color));
            border-left: 3px solid var(--accent-teal-dim);
            /* Persistent teal edge */
            border-radius: 3px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: grab;
            transition: all 0.15s;
            position: relative;
        }

        .kanban-card:active {
            cursor: grabbing;
        }

        .kanban-card:hover {
            border-color: color-mix(in srgb, var(--accent-teal) 50%, transparent);
            border-left-color: var(--accent-teal);
            /* Replace black shadow with a glowing teal bloom */
            box-shadow: 0 4px 12px color-mix(in srgb, var(--accent-teal) 20%, transparent);
            /* Elevate hovered card so its tooltip is above other cards */
            z-index: 50;
        }

        .kanban-card.dragging {
            opacity: 0.4;
            border-color: var(--accent-teal-dim);
        }

        .kanban-card.completed {
            opacity: 0.7;
            border-left: 3px solid var(--vscode-testing-iconPassed, #73c991);
        }
        .kanban-card.completed:hover {
            opacity: 0.85;
        }
        .card-done-badge {
            font-size: 10px;
            color: var(--vscode-testing-iconPassed, #73c991);
            padding: 2px 6px;
            border: 1px solid var(--vscode-testing-iconPassed, #73c991);
            border-radius: 3px;
            white-space: nowrap;
        }

        /* During drag, prevent child elements from interfering with drop targets */
        .column-body.drag-over .kanban-card,
        .column-body.drag-over .empty-state {
            pointer-events: none;
        }

        .card-topic {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-family: var(--font-mono);
            font-size: 9px;
            color: color-mix(in srgb, var(--text-secondary) 50%, var(--accent-teal-dim));
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .complexity-indicator {
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .complexity-indicator.high { color: #e06c75; }
        .complexity-indicator.low { color: #98c379; }
        .complexity-indicator.unknown { color: #7f848e; }

        .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .card-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 2px 6px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }

        .card-btn:hover {
            background: color-mix(in srgb, var(--text-secondary) 10%, transparent);
            border-color: var(--border-bright);
            color: var(--text-primary);
        }

        .card-btn.complete:hover {
            border-color: var(--accent-teal-dim);
            color: var(--accent-teal);
        }

        .card-btn.recover:hover {
            border-color: var(--vscode-testing-iconPassed, #73c991);
            color: var(--vscode-testing-iconPassed, #73c991);
        }

        .card-btn.icon-btn {
            padding: 4px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state {
            text-align: center;
            padding: 20px 10px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--vscode-scrollbarSlider-background, var(--border-bright));
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--vscode-scrollbarSlider-hoverBackground, var(--text-secondary));
        }

        /* Card Drop Animation */
        @keyframes dropPulse {
            0% { transform: scale(1.05); box-shadow: 0 4px 20px var(--accent-teal); }
            100% { transform: scale(1); box-shadow: 0 4px 12px color-mix(in srgb, var(--accent-teal) 20%, transparent); }
        }
        .card-dropped {
            animation: dropPulse 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Card Complete / Delete Animation */
        @keyframes cardComplete {
            0% { transform: scale(1); opacity: 1; }
            40% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(0.8) translateX(40px); opacity: 0; padding-top: 0; padding-bottom: 0; margin: 0; height: 0; border-width: 0; }
        }
        .card-completing {
            animation: cardComplete 0.4s ease-out forwards;
            pointer-events: none;
            overflow: hidden;
        }

        /* Autoban Read-Only Status Bar */
        .autoban-status-bar {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            background: var(--panel-bg2);
            border-bottom: 1px solid var(--border-color);
            font-family: var(--font-mono);
            font-size: 9px;
            min-height: 22px;
        }

        .autoban-indicator {
            color: var(--text-secondary);
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .autoban-indicator.is-active {
            color: var(--accent-teal);
        }

        @keyframes autobanPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .autoban-indicator.is-active::before {
            content: '⚡ ';
            animation: autobanPulse 2s ease-in-out infinite;
        }

        /* Selected card highlight */
        .kanban-card.selected {
            border-color: var(--accent-teal);
            border-left-color: var(--accent-teal);
            box-shadow: 0 0 8px color-mix(in srgb, var(--accent-teal) 35%, transparent),
                        inset 0 0 4px color-mix(in srgb, var(--accent-teal) 10%, transparent);
        }

        /* Column button area */
        .column-button-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 5px 8px;
            background: var(--panel-bg2);
            border-bottom: 1px solid var(--border-color);
            min-height: 32px;
            /* Prioritize button area in stacking context for tooltips */
            z-index: 10;
        }

        /* Ensure last column (Completed) has same header height */
        .kanban-column:last-child .column-button-area {
            height: 32px;
            min-height: 32px;
        }

        /* Recover buttons in Completed column — visible text-style buttons */
        .recover-selected-btn,
        .recover-all-btn {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.5px;
            color: var(--text-secondary, #888888);
            padding: 3px 8px !important;
        }
        .recover-selected-btn:hover,
        .recover-all-btn:hover {
            color: var(--accent-teal);
        }

        .column-icon-btn {
            background: transparent;
            border: 1px solid transparent;
            cursor: pointer;
            padding: 3px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            position: relative;
        }

        .column-icon-btn:hover {
            border-color: var(--accent-teal-dim);
            background: color-mix(in srgb, var(--accent-teal) 10%, transparent);
            box-shadow: 0 0 6px color-mix(in srgb, var(--accent-teal) 25%, transparent);
            /* Elevate hovered button to ensure tooltip is on top */
            z-index: 100;
        }

        .column-icon-btn img {
            width: 22px;
            height: 22px;
            filter: sepia(1) saturate(3) hue-rotate(140deg) brightness(0.9);
            transition: filter 0.15s;
        }

        .column-icon-btn:hover img {
            filter: sepia(1) saturate(3) hue-rotate(140deg) brightness(1.2);
        }

        /* Flash animation for icon button clicks */
        @keyframes iconFlash {
            0% { filter: sepia(1) saturate(5) hue-rotate(140deg) brightness(2.5) drop-shadow(0 0 8px var(--accent-teal)); }
            100% { filter: sepia(1) saturate(3) hue-rotate(140deg) brightness(0.9); }
        }
        .column-icon-btn.flash img {
            animation: iconFlash 0.35s ease-out forwards;
        }

        /* CSS Toggle Switch */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 16px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: var(--border-color);
            border-radius: 16px;
            transition: background 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 12px;
            width: 12px;
            left: 2px;
            bottom: 2px;
            background: var(--text-secondary);
            border-radius: 50%;
            transition: all 0.2s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: color-mix(in srgb, var(--accent-teal) 50%, transparent);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(16px);
            background: var(--accent-teal);
            box-shadow: 0 0 4px var(--accent-teal);
        }

        /* Inline autoban timers in controls strip */
        .autoban-timers-inline {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .autoban-timer-badge {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            background: color-mix(in srgb, var(--accent-teal) 6%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent-teal) 15%, transparent);
            padding: 2px 6px;
            border-radius: 2px;
            white-space: nowrap;
        }

        .autoban-timer-badge.is-active {
            color: var(--accent-teal);
            border-color: color-mix(in srgb, var(--accent-teal) 35%, transparent);
        }

        /* Controls strip spacer */
        .controls-spacer {
            flex: 1;
        }

        /* CLI toggle inline label */
        .cli-toggle-inline {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.6px;
            color: var(--accent-teal);
            text-transform: uppercase;
            user-select: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .cli-toggle-inline.is-off {
            color: var(--accent-orange);
        }

        /* Per-column mode toggle */
        .mode-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border: 1px solid var(--border-color);
            background: var(--panel-bg);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            margin-right: 8px;
            margin-left: auto;
        }

        .mode-toggle:hover {
            border-color: var(--accent-teal-dim);
            background: color-mix(in srgb, var(--accent-teal) 8%, transparent);
            box-shadow: var(--glow-teal);
            z-index: 100;
        }

        .mode-toggle img {
            width: 16px;
            height: 16px;
            filter: sepia(1) saturate(3) hue-rotate(140deg) brightness(0.8);
            transition: filter 0.15s;
        }

        .mode-toggle:hover img {
            filter: sepia(1) saturate(3) hue-rotate(140deg) brightness(1.1);
        }

        .mode-toggle.mode-prompt img {
            filter: sepia(1) saturate(1.5) hue-rotate(0deg) brightness(0.9);
        }
        
        .mode-toggle.mode-prompt:hover img {
            filter: sepia(1) saturate(1.5) hue-rotate(0deg) brightness(1.2);
        }

        /* Custom instant tooltips — replaces native title delay */
        /* Tooltips are ONLY for column header icons/buttons, never for card elements */
        [data-tooltip] {
            position: relative;
        }

        /* Body-level tooltip overlay — escapes all stacking contexts */
        #tooltip-overlay {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            background: var(--bg-tertiary, #1a1a2e);
            color: var(--text-primary, #e0e0e0);
            font-size: 10px;
            font-family: var(--font-mono);
            padding: 3px 8px;
            border-radius: 3px;
            white-space: nowrap;
            border: 1px solid var(--border-color, #2a2a4a);
            opacity: 0;
            visibility: hidden;
            transition: none;
        }
        #tooltip-overlay.visible {
            opacity: 1;
            visibility: visible;
            animation: tooltipFadeIn 0.1s ease-out forwards;
        }

        @keyframes tooltipFadeIn {
            to { opacity: 1; }
        }
    </style>
</head>

    <body>
    <div class="kanban-header">
        <div class="kanban-title" id="kanban-title">⚡ CLI-BAN - Drag plan cards to trigger CLI Agent actions | Copy prompts to send to IDE chat agents</div>
        <div class="header-controls">
            <select id="workspace-select" class="workspace-select" data-tooltip="Select workspace"></select>
        </div>
    </div>
    <div class="controls-strip">
        <button class="strip-btn" id="btn-autoban" data-tooltip="Start or stop the autoban engine">▶ START AUTOBAN</button>
        <div class="autoban-timers-inline" id="autoban-timers-inline"></div>
        <span class="controls-spacer"></span>
        <span class="triggers-off-badge" id="triggers-off-badge" hidden>⚠ TRIGGERS OFF</span>
        <label class="cli-toggle-inline" id="cli-toggle" data-tooltip="When OFF, moves and prompts do not trigger CLI agent actions">
            <label class="toggle-switch">
                <input type="checkbox" id="cli-triggers-toggle" checked>
                <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">CLI Triggers</span>
        </label>
        <label class="cli-toggle-inline pair-programming-toggle" id="pair-programming-toggle" data-tooltip="Pair Programming: Lead does high complexity work, Coder auto-starts low complexity work simultaneously">
            <label class="toggle-switch">
                <input type="checkbox" id="pairProgrammingCheckbox">
                <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">Pair Programming</span>
        </label>
        <button class="strip-btn" id="btn-refresh-strip" data-tooltip="Sync board with latest backend state">↻ SYNC BOARD</button>
    </div>
    <div id="db-warning-banner" style="display:none; background:#3a2a00; color:#ffcc00; padding:6px 12px; font-size:12px; text-align:center; border-bottom:1px solid #554400;">
        ⚠️ Database unavailable — card positions may not reflect manual moves
    </div>
    <div class="kanban-board" id="kanban-board"></div>

    <script>
        const vscode = acquireVsCodeApi();
        const kanbanBoard = document.getElementById('kanban-board');

        /* ── Tooltip overlay system ─────────────────────────────────── */
        const tooltipOverlay = document.getElementById('tooltip-overlay');
        let tooltipTarget = null;

        function showTooltip(el) {
            const text = el.getAttribute('data-tooltip');
            if (!text) return;

            tooltipTarget = el;
            tooltipOverlay.textContent = text;

            // Make visible off-screen first to measure dimensions
            tooltipOverlay.style.left = '-9999px';
            tooltipOverlay.style.top = '-9999px';
            tooltipOverlay.classList.add('visible');

            const rect = el.getBoundingClientRect();
            const tipRect = tooltipOverlay.getBoundingClientRect();
            const viewportW = document.documentElement.clientWidth;
            const GAP = 4;

            // Vertical: prefer above, flip below if clipped at top
            let top = rect.top - tipRect.height - GAP;
            if (top < 0) {
                top = rect.bottom + GAP;
            }

            // Horizontal: center on element, clamp to viewport
            let left = rect.left + rect.width / 2 - tipRect.width / 2;
            if (left < 4) left = 4;
            if (left + tipRect.width > viewportW - 4) {
                left = viewportW - tipRect.width - 4;
            }

            tooltipOverlay.style.left = left + 'px';
            tooltipOverlay.style.top = top + 'px';
        }

        function hideTooltip() {
            tooltipOverlay.classList.remove('visible');
            tooltipOverlay.style.left = '-9999px';
            tooltipOverlay.style.top = '-9999px';
            tooltipTarget = null;
        }

        // Delegation via mouseover/mouseout (these bubble, unlike mouseenter/mouseleave)
        document.addEventListener('mouseover', (e) => {
            const el = e.target.closest('[data-tooltip]');
            if (!el) return;
            if (el === tooltipTarget) return;
            hideTooltip();
            showTooltip(el);
        });

        document.addEventListener('mouseout', (e) => {
            const el = e.target.closest('[data-tooltip]');
            if (!el) return;
            const related = e.relatedTarget;
            if (related && el.contains(related)) return;
            hideTooltip();
        });
        let columnDefinitions = [
            { id: 'CREATED', label: 'New', role: null, autobanEnabled: true },
            { id: 'PLAN REVIEWED', label: 'Planned', role: 'planner', autobanEnabled: true },
            { id: 'LEAD CODED', label: 'Lead Coder', role: 'lead', autobanEnabled: true },
            { id: 'CODER CODED', label: 'Coder', role: 'coder', autobanEnabled: true },
            { id: 'CODE REVIEWED', label: 'Reviewed', role: 'reviewer', autobanEnabled: false },
            { id: 'COMPLETED', label: 'Completed', kind: 'completed', autobanEnabled: false }
        ];
        let columns = columnDefinitions.map(col => col.id);
        let currentCards = [];
        let lastAgentNames = {};
        let lastVisibleAgents = { lead: true, coder: true, reviewer: true, planner: true, analyst: true, jules: true };
        let cliTriggersEnabled = true;
        let autobanConfig = null; // Received from backend: { enabled, batchSize, rules }
        let autobanCountdownTimer = null;
        let autobanColumns = columnDefinitions.filter(col => col.autobanEnabled).map(col => col.id);
        let lastBoardSignature = '';
        let currentWorkspaceRoot = '';
        let workspaceItems = [];
        let columnDragDropModes = {};
        const selectedCards = new Set();

        // Column abbreviations for inline timers
        const COLUMN_ABBREV = { 'CREATED': 'C', 'PLAN REVIEWED': 'P', 'LEAD CODED': 'L', 'CODER CODED': 'R', 'COMPLETED': 'D' };

        // Icon URIs injected by extension
        const ICON_MOVE_SELECTED = '{{ICON_53}}';
        const ICON_MOVE_ALL = '{{ICON_54}}';
        const ICON_PROMPT_SELECTED = '{{ICON_22}}';
        const ICON_PROMPT_ALL = '{{ICON_115}}';
        const ICON_JULES = '{{ICON_28}}';
        const ICON_ANALYST_MAP = '{{ICON_ANALYST_MAP}}';
        const ICON_IMPORT_CLIPBOARD = '{{ICON_IMPORT_CLIPBOARD}}';
        const ICON_CLI = '{{ICON_CLI}}';
        const ICON_PROMPT = '{{ICON_PROMPT}}';

        function getActiveWorkspaceRoot() {
            return currentWorkspaceRoot || (workspaceItems[0] && workspaceItems[0].workspaceRoot) || '';
        }

        function postKanbanMessage(message) {
            vscode.postMessage({
                ...message,
                workspaceRoot: message.workspaceRoot || getActiveWorkspaceRoot()
            });
        }

        function updateWorkspaceSelector() {
            const select = document.getElementById('workspace-select');
            if (!select) return;
            const options = workspaceItems.map(item => `<option value="${escapeAttr(item.workspaceRoot)}">${escapeHtml(item.label)}</option>`).join('');
            select.innerHTML = options;
            if (currentWorkspaceRoot) {
                select.value = currentWorkspaceRoot;
            }
        }

        function updateCliToggleUi() {
            const toggle = document.getElementById('cli-triggers-toggle');
            const toggleLabel = document.getElementById('cli-toggle');
            const offBadge = document.getElementById('triggers-off-badge');
            if (toggle) {
                toggle.checked = !!cliTriggersEnabled;
            }
            if (toggleLabel) {
                toggleLabel.classList.toggle('is-off', !cliTriggersEnabled);
            }
            if (offBadge) {
                offBadge.hidden = !!cliTriggersEnabled;
            }
        }

        /** Get the next column in the pipeline (returns null for last column). */
        function getNextColumn(col) {
            const idx = columns.indexOf(col);
            if (idx < 0 || idx >= columns.length - 1) return null;
            return columns[idx + 1];
        }

        /** Flash an icon button for visual feedback. */
        function flashIconBtn(btn) {
            btn.classList.remove('flash');
            void btn.offsetWidth;
            btn.classList.add('flash');
            btn.addEventListener('animationend', () => btn.classList.remove('flash'), { once: true });
        }

        /** Get all selected session IDs within a specific column. */
        function getSelectedInColumn(col) {
            const container = document.getElementById('col-' + col);
            if (!container) return [];
            const ids = [];
            container.querySelectorAll('.kanban-card.selected').forEach(el => {
                ids.push(el.dataset.session);
            });
            return ids;
        }

        /** Get all session IDs within a specific column. */
        function getAllInColumn(col) {
            return currentCards.filter(c => c.column === col).map(c => c.sessionId);
        }

        function escapeAttr(value) {
            return String(value || '').replace(/"/g, '&quot;');
        }

        function getColumnDefinition(col) {
            return columnDefinitions.find(def => def.id === col) || null;
        }

        function buildBoardSignature(cards) {
            if (!Array.isArray(cards) || cards.length === 0) return '';
            return cards
                .map(card => `${card.workspaceRoot || ''}|${card.sessionId}|${card.column}|${card.topic || ''}|${card.planFile || ''}|${card.complexity || 'Unknown'}|${card.lastActivity || ''}`)
                .sort()
                .join('||');
        }

        function captureBoardViewState() {
            const columnScrollTop = {};
            columns.forEach(col => {
                const container = document.getElementById('col-' + col);
                if (container) columnScrollTop[col] = container.scrollTop;
            });
            return {
                boardScrollLeft: kanbanBoard.scrollLeft,
                pageScrollY: window.scrollY,
                columnScrollTop
            };
        }

        function restoreBoardViewState(viewState) {
            if (!viewState) return;
            kanbanBoard.scrollLeft = viewState.boardScrollLeft || 0;
            columns.forEach(col => {
                const container = document.getElementById('col-' + col);
                if (container) container.scrollTop = viewState.columnScrollTop[col] || 0;
            });
            window.scrollTo(0, viewState.pageScrollY || 0);
        }

        function renderColumns() {

            kanbanBoard.innerHTML = columnDefinitions.map(def => {
                const isCreated = def.id === 'CREATED';
                const isPlanReviewed = def.id === 'PLAN REVIEWED';
                const isCompleted = def.kind === 'completed';
                // Last working column = the column immediately before the completed column
                const completedIndex = columnDefinitions.findIndex(d => d.kind === 'completed');
                const defIndex = columnDefinitions.indexOf(def);
                const isLastWorkingColumn = !isCompleted && completedIndex > 0 && defIndex === completedIndex - 1;
                const hasAgent = !isCreated && !isCompleted;
                
                const mode = columnDragDropModes[def.id] || 'cli';
                const modeIcon = mode === 'prompt' ? ICON_PROMPT : ICON_CLI;
                const modeTitle = mode === 'prompt' ? 'Mode: Copy Prompt (drag cards to copy prompt to clipboard)' : 'Mode: CLI Dispatch (drag cards to trigger CLI agent)';
                const modeToggle = (!isCreated && !isLastWorkingColumn && !isCompleted) 
                    ? `<div class="mode-toggle mode-${mode}" data-column="${escapeAttr(def.id)}" data-tooltip="${escapeAttr(modeTitle)}">
                           <img src="${modeIcon}" alt="${mode}">
                       </div>` 
                    : '';

                const rightSide = isCreated
                    ? `<div style="display: flex; align-items: center; gap: 8px; line-height: 1;">
                            <button class="btn-add-plan" id="btn-add-plan" data-tooltip="Add Plan">+</button>
                            <button class="btn-add-plan" id="btn-import-clipboard" data-tooltip="Import plan from clipboard"><img src="${ICON_IMPORT_CLIPBOARD}" alt="Import" style="width: 16px; height: 16px;"></button>
                            <span class="column-count" id="count-${escapeAttr(def.id)}">0</span>
                       </div>`
                    : `<div style="display: flex; align-items: center; gap: 4px;">
                            ${modeToggle}
                            <span class="column-count" id="count-${escapeAttr(def.id)}">0</span>
                       </div>`;
                const subline = hasAgent
                    ? `<div class="column-agent" id="agent-${escapeAttr(def.id)}"></div>`
                    : `<div class="column-subline-spacer" aria-hidden="true"></div>`;

                // Column button area (with buttons for all columns except last/completed, empty strip for last)
                let buttonArea = '';
                if (isCompleted) {
                    buttonArea = `<div class="column-button-area">
                        <button class="column-icon-btn recover-selected-btn" data-column="${escapeAttr(def.id)}" data-tooltip="Recover selected plans back to active board">
                             ↩ Selected
                        </button>
                        <button class="column-icon-btn recover-all-btn" data-column="${escapeAttr(def.id)}" data-tooltip="Recover all completed plans back to active board">
                             ↩ All
                        </button>
                    </div>`;
                } else if (isLastWorkingColumn) {
                    // Reviewed column: Complete Selected / Complete All buttons only (no prompt/CLI dispatch)
                    buttonArea = `<div class="column-button-area">
                        <button class="column-icon-btn" data-action="completeSelected" data-column="${escapeAttr(def.id)}" data-tooltip="Complete selected plans (archive)">
                            <img src="${ICON_MOVE_SELECTED}" alt="Complete Selected">
                        </button>
                        <button class="column-icon-btn" data-action="completeAll" data-column="${escapeAttr(def.id)}" data-tooltip="Complete all plans in this column (archive)">
                            <img src="${ICON_MOVE_ALL}" alt="Complete All">
                        </button>
                    </div>`;
                } else {
                    const julesBtn = (isPlanReviewed && lastVisibleAgents.jules !== false)
                        ? `<button class="column-icon-btn" data-action="julesSelected" data-column="${escapeAttr(def.id)}" data-tooltip="Send selected plans to Jules">
                               <img src="${ICON_JULES}" alt="Jules">
                           </button>`
                        : '';
                    const analystMapBtn = (isPlanReviewed && lastVisibleAgents.analyst !== false)
                        ? `<button class="column-icon-btn" data-action="analystMapSelected" data-column="${escapeAttr(def.id)}" data-tooltip="Generate context map for selected plans">
                               <img src="${ICON_ANALYST_MAP}" alt="Analyst Map">
                           </button>`
                        : '';
                    buttonArea = `<div class="column-button-area">
                        <button class="column-icon-btn" data-action="moveSelected" data-column="${escapeAttr(def.id)}" data-tooltip="Move selected plans to next stage (triggers CLI if enabled)">
                            <img src="${ICON_MOVE_SELECTED}" alt="Move Selected">
                        </button>
                        <button class="column-icon-btn" data-action="moveAll" data-column="${escapeAttr(def.id)}" data-tooltip="Move all plans in this column to next stage">
                            <img src="${ICON_MOVE_ALL}" alt="Move All">
                        </button>
                        <button class="column-icon-btn" data-action="promptSelected" data-column="${escapeAttr(def.id)}" data-tooltip="Copy prompt for selected plans and advance to next stage">
                            <img src="${ICON_PROMPT_SELECTED}" alt="Prompt Selected">
                        </button>
                        <button class="column-icon-btn" data-action="promptAll" data-column="${escapeAttr(def.id)}" data-tooltip="Copy prompt for all plans in this column and advance">
                            <img src="${ICON_PROMPT_ALL}" alt="Prompt All">
                        </button>
                        ${julesBtn}
                        ${analystMapBtn}
                    </div>`;
                }

                return `<div class="kanban-column" data-column="${escapeAttr(def.id)}">
                    <div class="column-header">
                        <div style="display:flex; flex-direction:column;">
                            <span class="column-name">${escapeHtml(def.label)}</span>
                            ${subline}
                        </div>
                        ${rightSide}
                    </div>
                    ${buttonArea}
                    <div class="column-body" id="col-${escapeAttr(def.id)}"></div>
                </div>`;
            }).join('');

            document.getElementById('btn-add-plan')?.addEventListener('click', () => {
                postKanbanMessage({ type: 'createPlan' });
            });

            document.getElementById('btn-import-clipboard')?.addEventListener('click', () => {
                postKanbanMessage({ type: 'importFromClipboard' });
            });

            // Mode toggle handlers
            document.querySelectorAll('.mode-toggle').forEach(toggle => {
                toggle.addEventListener('click', () => {
                    const columnId = toggle.dataset.column;
                    const currentMode = columnDragDropModes[columnId] || 'cli';
                    const nextMode = currentMode === 'cli' ? 'prompt' : 'cli';
                    
                    // Optimistic update
                    columnDragDropModes[columnId] = nextMode;
                    renderColumns();
                    renderBoard(currentCards);
                    updateAllColumnAgents();
                    
                    postKanbanMessage({ type: 'setColumnDragDropMode', columnId, mode: nextMode });
                });
            });

            // Column icon button handlers
            document.querySelectorAll('.column-icon-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    flashIconBtn(btn);
                    const action = btn.dataset.action;
                    const column = btn.dataset.column;
                    const nextCol = getNextColumn(column);
                    if (!nextCol && action !== 'julesSelected' && action !== 'analystMapSelected' && action !== 'completeSelected' && action !== 'completeAll') return;

                    switch (action) {
                        case 'moveSelected': {
                            const ids = getSelectedInColumn(column);
                            if (ids.length === 0) return;
                            postKanbanMessage({ type: 'moveSelected', column, sessionIds: ids });
                            ids.forEach(id => selectedCards.delete(id));
                            break;
                        }
                        case 'moveAll': {
                            const ids = getAllInColumn(column);
                            if (ids.length === 0) return;
                            postKanbanMessage({ type: 'moveAll', column });
                            ids.forEach(id => selectedCards.delete(id));
                            break;
                        }
                        case 'promptSelected': {
                            const ids = getSelectedInColumn(column);
                            if (ids.length === 0) return;
                            postKanbanMessage({ type: 'promptSelected', column, sessionIds: ids });
                            ids.forEach(id => selectedCards.delete(id));
                            break;
                        }
                        case 'promptAll': {
                            const ids = getAllInColumn(column);
                            if (ids.length === 0) return;
                            postKanbanMessage({ type: 'promptAll', column });
                            ids.forEach(id => selectedCards.delete(id));
                            break;
                        }
                        case 'julesSelected': {
                            const ids = getSelectedInColumn(column);
                            if (ids.length === 0) return;
                            postKanbanMessage({ type: 'julesSelected', sessionIds: ids });
                            ids.forEach(id => selectedCards.delete(id));
                            break;
                        }
                        case 'analystMapSelected': {
                            const ids = getSelectedInColumn(column);
                            if (ids.length === 0) return;
                            postKanbanMessage({ type: 'analystMapSelected', sessionIds: ids });
                            ids.forEach(id => selectedCards.delete(id));
                            break;
                        }
                        case 'completeSelected': {
                            const ids = getSelectedInColumn(column);
                            if (ids.length === 0) return;
                            postKanbanMessage({ type: 'completeSelected', sessionIds: ids, workspaceRoot: getActiveWorkspaceRoot() });
                            ids.forEach(id => selectedCards.delete(id));
                            break;
                        }
                        case 'completeAll': {
                            const ids = getAllInColumn(column);
                            if (ids.length === 0) return;
                            postKanbanMessage({ type: 'completeAll', workspaceRoot: getActiveWorkspaceRoot() });
                            ids.forEach(id => selectedCards.delete(id));
                            break;
                        }
                    }
                });
            });

            document.querySelectorAll('.column-body').forEach(container => {
                const col = container.id.replace(/^col-/, '');
                container.addEventListener('dragover', handleDragOver);
                container.addEventListener('dragenter', handleDragEnter);
                container.addEventListener('dragleave', handleDragLeave);
                container.addEventListener('drop', (e) => handleDrop(e, col));
            });
        }

        /** Map a kanban column to its assigned agent role. */
        function columnToRole(col) {
            const def = getColumnDefinition(col);
            return def ? (def.role || null) : null;
        }

        /** Check if a column's agent is visible (enabled). */
        function isColumnAgentVisible(col) {
            const role = columnToRole(col);
            if (!role) return true;
            return lastVisibleAgents[role] !== false;
        }

        /** Check if a column currently has an assigned agent command behind it. */
        function isColumnAgentAssigned(col) {
            const role = columnToRole(col);
            if (!role) return true;
            const name = lastAgentNames[role];
            return !!name && name !== 'No agent assigned';
        }

        function isColumnAgentAvailable(col) {
            return isColumnAgentVisible(col) && isColumnAgentAssigned(col);
        }

        function updateAllColumnAgents() {
            if (!lastAgentNames) return;

            columns.forEach(col => {
                const el = document.getElementById('agent-' + col);
                if (el) {
                    const role = columnToRole(col);
                    const name = lastAgentNames[role];
                    if (role && (lastVisibleAgents[role] === false || name === 'No agent assigned')) {
                        el.textContent = 'No agent assigned';
                        el.style.color = 'var(--vscode-editorWarning-foreground, #cca700)';
                        el.style.fontStyle = 'italic';
                    } else {
                        el.textContent = name || '';
                        el.style.color = '';
                        el.style.fontStyle = '';
                    }
                }
            });
        }

        function updateJulesButtonVisibility() {
            const isVisible = lastVisibleAgents.jules !== false;
            document.querySelectorAll('[data-action="julesSelected"]').forEach(btn => {
                btn.style.display = isVisible ? '' : 'none';
            });
        }

        function updateAutobanButtonState() {
            const autobanBtn = document.getElementById('btn-autoban');
            if (!autobanBtn) return;
            const isEnabled = !!(autobanConfig && autobanConfig.enabled);
            autobanBtn.classList.toggle('is-active', isEnabled);
            autobanBtn.textContent = isEnabled ? '⏸ STOP AUTOBAN' : '▶ START AUTOBAN';
            autobanBtn.title = isEnabled ? 'Stop autoban engine' : 'Start autoban engine';
        }

        function syncAutobanCountdownTimer() {
            const shouldRun = !!(autobanConfig && autobanConfig.enabled);
            if (shouldRun && !autobanCountdownTimer) {
                autobanCountdownTimer = setInterval(updateAutobanIndicators, 1000);
                return;
            }
            if (!shouldRun && autobanCountdownTimer) {
                clearInterval(autobanCountdownTimer);
                autobanCountdownTimer = null;
            }
        }

        function renderBoard(cards) {
            hideTooltip();
            const viewState = captureBoardViewState();
            currentCards = cards;
            const buckets = {};
            columns.forEach(c => buckets[c] = []);

            cards.forEach(card => {
                const col = columns.includes(card.column) ? card.column : 'CREATED';
                buckets[col].push(card);
            });

            columns.forEach(col => {
                const container = document.getElementById('col-' + col);
                const countEl = document.getElementById('count-' + col);
                const items = buckets[col];
                if (!container || !countEl) return;
                items.sort((a, b) => (a.lastActivity || '').localeCompare(b.lastActivity || ''));
                countEl.textContent = items.length;

                if (items.length === 0) {
                    container.innerHTML = '<div class="empty-state">No plans</div>';
                } else {
                    container.innerHTML = items.map(card => createCardHtml(card)).join('');
                }
            });

            // Attach card-level event listeners
            document.querySelectorAll('.kanban-card').forEach(el => {
                el.addEventListener('dragstart', handleDragStart);
                el.addEventListener('dragend', handleDragEnd);

                // Card selection toggle (click on card body, not on buttons)
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.card-btn') || e.target.closest('button')) return;
                    const sid = el.dataset.session;
                    if (selectedCards.has(sid)) {
                        selectedCards.delete(sid);
                        el.classList.remove('selected');
                    } else {
                        selectedCards.add(sid);
                        el.classList.add('selected');
                    }
                });

                // Re-apply selection state after re-render
                if (selectedCards.has(el.dataset.session)) {
                    el.classList.add('selected');
                }
            });

            document.querySelectorAll('.card-btn.review').forEach(btn => {
                btn.addEventListener('click', () => {
                    postKanbanMessage({ type: 'reviewPlan', sessionId: btn.dataset.session, workspaceRoot: btn.dataset.workspaceRoot });
                });
            });

            document.querySelectorAll('.card-btn.complete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const cardEl = e.target.closest('.kanban-card');
                    if (cardEl) {
                        // Optimistic UI: Animate out before sending to backend
                        cardEl.classList.add('card-completing');
                        setTimeout(() => {
                            postKanbanMessage({ type: 'completePlan', sessionId: btn.dataset.session, workspaceRoot: btn.dataset.workspaceRoot });
                        }, 350); // Slightly less than 400ms to ensure smooth handoff to the backend redraw
                    } else {
                        // Fallback if DOM traversal fails
                        postKanbanMessage({ type: 'completePlan', sessionId: btn.dataset.session, workspaceRoot: btn.dataset.workspaceRoot });
                    }
                });
            });

            document.querySelectorAll('.card-btn.copy').forEach(btn => {
                btn.addEventListener('click', () => {
                    btn.disabled = true;
                    const column = btn.closest('.kanban-column')?.dataset?.column;
                    postKanbanMessage({ type: 'copyPlanLink', sessionId: btn.dataset.session, column, workspaceRoot: btn.dataset.workspaceRoot });
                });
            });

            document.querySelectorAll('.card-btn.recover').forEach(btn => {
                btn.addEventListener('click', () => {
                    btn.disabled = true;
                    btn.textContent = 'Recovering…';
                    postKanbanMessage({ type: 'recoverSelected', sessionIds: [btn.dataset.session] });
                });
            });

            document.querySelectorAll('.pair-program-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const sessionId = btn.dataset.session;
                    postKanbanMessage({ type: 'pairProgramCard', sessionId });
                });
            });

            requestAnimationFrame(() => restoreBoardViewState(viewState));
        }

        function createCardHtml(card) {
            const timeAgo = formatTimeAgo(card.lastActivity);
            const shortTopic = card.topic.length > 50 ? card.topic.substring(0, 47) + '...' : card.topic;
            const complexity = card.complexity || 'Unknown';
            const complexityClass = complexity.toLowerCase();
            const isCompleted = card.column === 'COMPLETED';
            const completedClass = isCompleted ? ' completed' : '';

            // For completed cards, show a Recover button instead of Copy Prompt
            let primaryActionBtn;
            if (isCompleted) {
                primaryActionBtn = `<button class="card-btn recover" data-session="${card.sessionId}">Recover</button>`;
            } else {
                let copyLabel = 'Copy Prompt';
                if (card.column === 'CREATED') {
                    copyLabel = 'Copy planning prompt';
                } else if (card.column === 'PLAN REVIEWED') {
                    copyLabel = 'Copy coder prompt';
                } else if (card.column === 'LEAD CODED' || card.column === 'CODER CODED') {
                    copyLabel = 'Copy review prompt';
                }
                primaryActionBtn = `<button class="card-btn copy" data-session="${card.sessionId}" data-workspace-root="${escapeAttr(card.workspaceRoot)}">${copyLabel}</button>`;
            }

            const pairProgramBtn = (card.column === 'PLAN REVIEWED' && complexity === 'High')
                ? `<button class="card-btn pair-program-btn" data-session="${card.sessionId}">Pair</button>`
                : '';
            const completeOrDoneBtn = isCompleted
                ? `<span class="card-done-badge">✓ Done</span>`
                : `<button class="card-btn icon-btn complete" data-session="${card.sessionId}" data-workspace-root="${escapeAttr(card.workspaceRoot)}">
                       <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 8.5l3 3 6-6"/></svg>
                   </button>`;
            return `
                <div class="kanban-card${completedClass}" draggable="true" data-session="${card.sessionId}" data-workspace-root="${escapeAttr(card.workspaceRoot)}">
                    <div class="card-topic">${escapeHtml(shortTopic)}</div>
                    <div class="card-meta">Complexity: <span class="complexity-indicator ${complexityClass}">${complexity}</span> · ${timeAgo}</div>
                    <div class="card-actions" style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; gap: 4px;">
                            ${pairProgramBtn}
                            ${primaryActionBtn}
                        </div>
                        <div style="display: flex; gap: 4px;">
                            <button class="card-btn icon-btn review" data-session="${card.sessionId}" data-workspace-root="${escapeAttr(card.workspaceRoot)}">
                                <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 1.5l3 3L5 14H2v-3L11.5 1.5z"/></svg>
                            </button>
                            ${completeOrDoneBtn}
                        </div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatTimeAgo(iso) {
            if (!iso) return '';
            const diff = Date.now() - new Date(iso).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            return Math.floor(hrs / 24) + 'd ago';
        }

        // Recover Selected handler
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.recover-selected-btn');
            if (!btn) return;
            const selected = getSelectedInColumn('COMPLETED');
            if (selected.length === 0) {
                vscode.postMessage({ type: 'showInfo', message: 'No cards selected. Use checkboxes to select cards to recover.' });
                return;
            }
            postKanbanMessage({ type: 'recoverSelected', sessionIds: selected });
        });

        // Recover All handler
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.recover-all-btn');
            if (!btn) return;
            const allCompleted = getAllInColumn('COMPLETED');
            if (allCompleted.length === 0) return;
            postKanbanMessage({ type: 'recoverAll', sessionIds: allCompleted, count: allCompleted.length });
        });

        // Drag & Drop handlers
        let draggedSessionId = null;

        function handleDragStart(e) {
            draggedSessionId = e.target.dataset.session;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedSessionId);
            e.dataTransfer.setData('application/switchboard-workspace-root', e.target.dataset.workspaceRoot || getActiveWorkspaceRoot());
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.column-body').forEach(el => el.classList.remove('drag-over'));
            draggedSessionId = null;
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDragEnter(e) {
            e.preventDefault();
            const body = e.currentTarget;
            body.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            const body = e.currentTarget;
            // Only remove drag-over when actually leaving the column-body,
            // not when entering a child element within it.
            const related = e.relatedTarget;
            if (!related || !body.contains(related)) {
                body.classList.remove('drag-over');
            }
        }

        function handleDrop(e, targetColumn) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const workspaceRoot = e.dataTransfer.getData('application/switchboard-workspace-root') || getActiveWorkspaceRoot();
            
            let sessionIds = [];
            try {
                sessionIds = JSON.parse(e.dataTransfer.getData('application/json'));
            } catch {
                const plain = e.dataTransfer.getData('text/plain');
                if (plain) sessionIds = [plain];
            }
            
            if (!sessionIds || sessionIds.length === 0) return;

            const forwardIds = [];
            const backwardIds = [];

            sessionIds.forEach(id => {
                const card = currentCards.find(c => c.sessionId === id);
                if (!card || card.column === targetColumn) return;
                
                const sourceIndex = columns.indexOf(card.column);
                const targetIndex = columns.indexOf(targetColumn);
                
                if (targetIndex < sourceIndex) {
                    backwardIds.push(id);
                } else {
                    forwardIds.push(id);
                }
            });

            // Special handling: forward drops INTO COMPLETED trigger archive, not dispatch
            if (targetColumn === 'COMPLETED' && forwardIds.length > 0) {
                const completingIds = forwardIds.slice();
                // Optimistic DOM move: relocate cards to COMPLETED column with animation
                const targetBody = document.getElementById('col-' + targetColumn);
                completingIds.forEach(id => {
                    const card = currentCards.find(c => c.sessionId === id);
                    const cardEl = document.querySelector(`.kanban-card[data-session="${id}"]`);
                    if (cardEl && targetBody) {
                        const emptyState = targetBody.querySelector('.empty-state');
                        if (emptyState) emptyState.remove();
                        cardEl.classList.add('card-completing');
                        targetBody.appendChild(cardEl);
                        // Update source column empty state
                        if (card) {
                            const sourceBody = document.getElementById('col-' + card.column);
                            if (sourceBody && sourceBody.querySelectorAll('.kanban-card').length === 0) {
                                sourceBody.innerHTML = '<div class="empty-state">No plans</div>';
                            }
                            const srcCount = document.getElementById('count-' + card.column);
                            if (srcCount) srcCount.textContent = String(Math.max(0, parseInt(srcCount.textContent) - 1));
                            card.column = targetColumn;
                        }
                        const tgtCount = document.getElementById('count-' + targetColumn);
                        if (tgtCount) tgtCount.textContent = String(parseInt(tgtCount.textContent) + 1);
                    }
                    postKanbanMessage({ type: 'completePlan', sessionId: id, workspaceRoot: card?.workspaceRoot || workspaceRoot });
                });
                forwardIds.length = 0;
            }

            // Special handling: backward drags FROM COMPLETED trigger uncomplete/restore
            const uncompleteIds = backwardIds.filter(id => {
                const card = currentCards.find(c => c.sessionId === id);
                return card && card.column === 'COMPLETED';
            });
            if (uncompleteIds.length > 0) {
                postKanbanMessage({ type: 'uncompleteCard', sessionIds: uncompleteIds, targetColumn, workspaceRoot });
                uncompleteIds.forEach(id => {
                    const idx = backwardIds.indexOf(id);
                    if (idx >= 0) backwardIds.splice(idx, 1);
                });
            }

            // Determine the effective drop mode for this column
            const dropMode = columnDragDropModes[targetColumn] || 'cli';

            if (forwardIds.length > 0) {
                // Agent availability check only applies in CLI mode — prompt mode doesn't need a CLI agent
                if (dropMode === 'cli' && cliTriggersEnabled && !isColumnAgentAvailable(targetColumn)) {
                    // Strip forward moves if agent isn't ready/assigned, but allow backward moves to proceed
                    forwardIds.length = 0; 
                    const agentEl = document.getElementById('agent-' + targetColumn);
                    if (agentEl) {
                        agentEl.style.transition = 'color 0.15s';
                        agentEl.style.color = 'var(--vscode-errorForeground, #f44747)';
                        setTimeout(() => {
                            agentEl.style.color = 'var(--vscode-editorWarning-foreground, #cca700)';
                        }, 800);
                    }
                }
            }

            const validIds = [...forwardIds, ...backwardIds];
            if (validIds.length === 0) return;

            // Capture source columns BEFORE the optimistic update loop mutates card.column
            const sourceColumnForPrompt = forwardIds.length > 0
                ? (currentCards.find(c => c.sessionId === forwardIds[0])?.column || targetColumn)
                : targetColumn;

            const targetBody = document.getElementById('col-' + targetColumn);

            validIds.forEach(id => {
                const card = currentCards.find(c => c.sessionId === id);
                const cardEl = document.querySelector(`.kanban-card[data-session="${id}"]`);
                if (cardEl && targetBody) {
                    // Remove empty-state placeholder if present
                    const emptyState = targetBody.querySelector('.empty-state');
                    if (emptyState) emptyState.remove();
                    targetBody.appendChild(cardEl);

                    // Update source column: show empty-state if now empty
                    const sourceBody = document.getElementById('col-' + card.column);
                    if (sourceBody && sourceBody.querySelectorAll('.kanban-card').length === 0) {
                        sourceBody.innerHTML = '<div class="empty-state">No plans</div>';
                    }

                    // Update counts
                    const srcCount = document.getElementById('count-' + card.column);
                    const tgtCount = document.getElementById('count-' + targetColumn);
                    if (srcCount) srcCount.textContent = String(Math.max(0, parseInt(srcCount.textContent) - 1));
                    if (tgtCount) tgtCount.textContent = String(parseInt(tgtCount.textContent) + 1);

                    // Update in-memory state
                    card.column = targetColumn;

                    // Trigger drop animation
                    cardEl.classList.remove('card-dropped'); 
                    void cardEl.offsetWidth; // Trigger reflow to restart animation
                    cardEl.classList.add('card-dropped');
                    cardEl.addEventListener('animationend', () => {
                        cardEl.classList.remove('card-dropped');
                    }, { once: true });
                }
            });

            if (validIds.length > 0) {
                document.querySelectorAll('.kanban-card.selected').forEach(el => el.classList.remove('selected'));
                setTimeout(() => {
                    if (cliTriggersEnabled && forwardIds.length > 0) {
                        if (dropMode === 'prompt') {
                            // Prompt mode: copy prompt to clipboard + visual advance (no CLI dispatch)
                            // sourceColumnForPrompt was captured before the optimistic card.column update
                            postKanbanMessage({ type: 'promptOnDrop', sessionIds: forwardIds, sourceColumn: sourceColumnForPrompt, targetColumn, workspaceRoot });
                        } else {
                            // CLI mode: dispatch to CLI agent (existing behaviour)
                            if (forwardIds.length === 1) {
                                postKanbanMessage({ type: 'triggerAction', sessionId: forwardIds[0], targetColumn, workspaceRoot });
                            } else {
                                postKanbanMessage({ type: 'triggerBatchAction', sessionIds: forwardIds, targetColumn, workspaceRoot });
                            }
                        }
                    } else if (forwardIds.length > 0) {
                        postKanbanMessage({ type: 'moveCardForward', sessionIds: forwardIds, targetColumn, workspaceRoot });
                    }
                    
                    if (backwardIds.length > 0) {
                        postKanbanMessage({ type: 'moveCardBackwards', sessionIds: backwardIds, targetColumn, workspaceRoot });
                    }
                }, 350);
            }
        }

        // Listen for messages from the extension
        window.addEventListener('message', (event) => {
            const msg = event.data;
            switch (msg.type) {
                case 'updateWorkspaceSelection':
                    currentWorkspaceRoot = msg.workspaceRoot || '';
                    workspaceItems = Array.isArray(msg.workspaces) ? msg.workspaces : [];
                    updateWorkspaceSelector();
                    break;
                case 'updateBoard':
                    const nextCards = Array.isArray(msg.cards) ? msg.cards : [];
                    const nextBoardSignature = buildBoardSignature(nextCards);
                    const dbWarningBanner = document.getElementById('db-warning-banner');
                    if (dbWarningBanner) {
                        dbWarningBanner.style.display = msg.dbUnavailable ? '' : 'none';
                    }
                    if (nextBoardSignature !== lastBoardSignature) {
                        lastBoardSignature = nextBoardSignature;
                        renderBoard(nextCards);
                    } else {
                        currentCards = nextCards;
                    }
                    break;
                case 'updateColumns':
                    if (Array.isArray(msg.columns) && msg.columns.length > 0) {
                        columnDefinitions = msg.columns;
                        columns = columnDefinitions.map(col => col.id);
                        autobanColumns = columnDefinitions.filter(col => col.autobanEnabled).map(col => col.id);
                        lastBoardSignature = '';
                        renderColumns();
                        renderBoard(currentCards);
                        updateAllColumnAgents();
                        updateAutobanIndicators();
                    }
                    break;
                case 'updateAgentNames':
                    lastAgentNames = msg.agentNames || {};
                    updateAllColumnAgents();
                    break;
                case 'cliTriggersState':
                    cliTriggersEnabled = msg.enabled !== false;
                    updateCliToggleUi();
                    break;
                case 'visibleAgents':
                    if (msg.agents) {
                        lastVisibleAgents = { ...lastVisibleAgents, ...msg.agents };
                        updateAllColumnAgents();
                        updateJulesButtonVisibility();
                    }
                    break;
                case 'copyPlanLinkResult':
                    const btn = document.querySelector(`.card-btn.copy[data-session="${msg.sessionId}"]`);
                    if (btn) {
                        if (msg.success) {
                            const originalText = btn.textContent;
                            btn.textContent = 'Copied!';
                            const originalBg = btn.style.backgroundColor;
                            const originalColor = btn.style.color;
                            btn.style.backgroundColor = 'var(--vscode-testing-iconPassed, #73c991)';
                            btn.style.color = 'var(--vscode-editor-background, #1e1e1e)';
                            setTimeout(() => {
                                btn.textContent = originalText;
                                btn.style.backgroundColor = originalBg;
                                btn.style.color = originalColor;
                                btn.disabled = false;
                            }, 1500);
                        } else {
                            btn.disabled = false;
                        }
                    }
                    break;
                case 'updateAutobanConfig':
                    autobanConfig = msg.state || null;
                    updateAutobanIndicators();
                    syncAutobanCountdownTimer();
                    updateAutobanButtonState();
                    break;
                case 'updatePairProgramming': {
                    const ppCheckbox = document.getElementById('pairProgrammingCheckbox');
                    if (ppCheckbox) {
                        ppCheckbox.checked = msg.enabled;
                        ppCheckbox.closest('.pair-programming-toggle')?.classList.toggle('is-off', !msg.enabled);
                    }
                    break;
                }
                case 'updateColumnDragDropModes':
                    if (msg.modes && typeof msg.modes === 'object') {
                        columnDragDropModes = msg.modes;
                        // Update toggle icons to reflect received modes
                        document.querySelectorAll('.mode-toggle').forEach(toggle => {
                            const colId = toggle.dataset.column;
                            const mode = columnDragDropModes[colId] || 'cli';
                            toggle.classList.toggle('mode-cli', mode === 'cli');
                            toggle.classList.toggle('mode-prompt', mode === 'prompt');
                            const img = toggle.querySelector('img');
                            if (img) {
                                img.src = mode === 'prompt' ? ICON_PROMPT : ICON_CLI;
                                img.alt = mode;
                            }
                            toggle.title = mode === 'prompt'
                                ? 'Mode: Copy Prompt (drag cards to copy prompt to clipboard)'
                                : 'Mode: CLI Dispatch (drag cards to trigger CLI agent)';
                        });
                    }
                    break;
                case 'promptOnDropResult': {
                    // Visual feedback when prompt-mode drop completes: flash the target column count badge green
                    if (msg.success && Array.isArray(msg.sessionIds) && msg.sessionIds.length > 0) {
                        const card = currentCards.find(c => msg.sessionIds.includes(c.sessionId));
                        if (card) {
                            const countEl = document.getElementById('count-' + card.column);
                            if (countEl) {
                                const origText = countEl.textContent;
                                const origBg = countEl.style.background;
                                const origColor = countEl.style.color;
                                countEl.textContent = '✓';
                                countEl.style.background = 'var(--vscode-testing-iconPassed, #73c991)';
                                countEl.style.color = 'var(--vscode-editor-background, #1e1e1e)';
                                setTimeout(() => {
                                    countEl.textContent = origText;
                                    countEl.style.background = origBg;
                                    countEl.style.color = origColor;
                                }, 1200);
                            }
                        }
                    }
                    break;
                }
            }
        });

        /** Format seconds as MM:SS */
        function formatCountdown(secs) {
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        /** Update autoban timer badges inline in the controls strip. */
        function updateAutobanIndicators() {
            const container = document.getElementById('autoban-timers-inline');
            if (!container) { updateAutobanButtonState(); return; }

            if (!autobanConfig || !autobanConfig.enabled) {
                container.innerHTML = '';
                updateAutobanButtonState();
                return;
            }

            const badges = autobanColumns.map(col => {
                const abbrev = COLUMN_ABBREV[col] || col.charAt(0);
                const rule = autobanConfig.rules && autobanConfig.rules[col];
                if (rule && rule.enabled) {
                    const lastTickAt = Number(autobanConfig.lastTickAt && autobanConfig.lastTickAt[col]) || Date.now();
                    const intervalMs = Math.max(1, Number(rule.intervalMinutes) || 1) * 60 * 1000;
                    const nextTickAt = lastTickAt + intervalMs;
                    const remainingSec = Math.max(0, Math.ceil((nextTickAt - Date.now()) / 1000));
                    const text = remainingSec > 0 ? `${abbrev}: ${formatCountdown(remainingSec)}` : `${abbrev}: GO`;
                    return `<span class="autoban-timer-badge is-active">${text}</span>`;
                } else {
                    return `<span class="autoban-timer-badge">${abbrev}: off</span>`;
                }
            }).join('');
            container.innerHTML = badges;
            updateAutobanButtonState();
        }

        document.getElementById('workspace-select')?.addEventListener('change', (event) => {
            currentWorkspaceRoot = event.target.value || '';
            lastBoardSignature = '';
            postKanbanMessage({ type: 'selectWorkspace', workspaceRoot: currentWorkspaceRoot });
        });
        document.getElementById('btn-autoban')?.addEventListener('click', () => {
            const currentlyEnabled = !!(autobanConfig && autobanConfig.enabled);
            postKanbanMessage({ type: 'toggleAutoban', enabled: !currentlyEnabled });
        });
        document.getElementById('btn-refresh-strip').addEventListener('click', () => {
            postKanbanMessage({ type: 'refresh' });
        });
        document.getElementById('cli-triggers-toggle').addEventListener('change', (event) => {
            const checked = !!event.target?.checked;
            cliTriggersEnabled = checked;
            updateCliToggleUi();
            postKanbanMessage({ type: 'toggleCliTriggers', enabled: checked });
        });
        document.getElementById('pairProgrammingCheckbox')?.addEventListener('change', (e) => {
            postKanbanMessage({ type: 'togglePairProgramming', enabled: e.target.checked });
        });

        updateCliToggleUi();
        renderColumns();
        renderBoard([]);
        updateAutobanButtonState();
        syncAutobanCountdownTimer();

        // Signal to extension that webview is ready to receive data
        postKanbanMessage({ type: 'ready' });
    </script>
    <div id="tooltip-overlay"></div>
</body>

</html>
