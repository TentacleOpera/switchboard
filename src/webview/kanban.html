<!-- Switchboard Kanban Board -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switchboard Kanban</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #000000;
            --panel-bg2: #0a0a0a;
            --border-color: #333333;
            --border-bright: #555555;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;

            --accent-teal: #3ddbd9;
            --accent-teal-dim: color-mix(in srgb, var(--accent-teal) 40%, transparent);
            --glow-teal: 0 0 10px color-mix(in srgb, var(--accent-teal) 50%, transparent);
            --accent-red: #da3633;
            --accent-orange: #d29922;
            --font-family: var(--vscode-font-family, 'Segoe UI', 'Roboto', sans-serif);
            --font-mono: var(--vscode-editor-font-family, 'Consolas', 'Courier New', monospace);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .kanban-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--panel-bg);
        }

        .kanban-title {
            flex: 1;
            min-width: 0;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-teal);
            text-shadow: var(--glow-teal);
        }

        .kanban-title.triggers-off {
            color: color-mix(in srgb, var(--accent-teal) 55%, var(--text-secondary));
            text-shadow: none;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls-strip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-bottom: 1px solid var(--border-color);
            background: var(--panel-bg2);
            flex-wrap: wrap;
        }

        .cli-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.6px;
            color: var(--accent-teal);
            user-select: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        .cli-toggle input[type="checkbox"] {
            width: 12px;
            height: 12px;
            accent-color: var(--accent-teal);
            cursor: pointer;
        }

        .cli-toggle.is-off .toggle-label {
            color: var(--accent-orange);
        }

        .triggers-off-badge {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.6px;
            color: var(--accent-orange);
            border: 1px solid color-mix(in srgb, var(--accent-orange) 45%, transparent);
            background: color-mix(in srgb, var(--accent-orange) 15%, transparent);
            padding: 2px 6px;
            border-radius: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .strip-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }

        .strip-btn:hover {
            background: color-mix(in srgb, var(--accent-teal) 8%, transparent);
            border-color: var(--accent-teal-dim);
            color: var(--accent-teal);
        }

        .strip-btn.is-active {
            color: var(--accent-teal);
            border-color: var(--accent-teal-dim);
            box-shadow: var(--glow-teal);
            background: color-mix(in srgb, var(--accent-teal) 10%, transparent);
        }

        .btn-add-plan {
            background: color-mix(in srgb, var(--accent-teal) 15%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent-teal) 30%, transparent);
            color: var(--accent-teal);
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: bold;
            line-height: 1;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
            box-shadow: var(--glow-teal);
        }

        .btn-add-plan:hover {
            background: var(--accent-teal);
            color: var(--panel-bg);
            box-shadow: 0 0 15px var(--accent-teal);
        }

        .kanban-board {
            display: flex;
            gap: 12px;
            padding: 16px;
            height: calc(100vh - 50px - 36px);
            overflow-x: auto;
        }

        .kanban-column {
            flex: 1;
            min-width: 220px;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border: 1px solid var(--vscode-contrastBorder, var(--border-color));
            border-radius: 4px;
            overflow: hidden;
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            background: var(--panel-bg2);
            min-height: 52px;
        }

        .column-name {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .column-agent {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text-secondary);
            margin-top: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            letter-spacing: 0.5px;
            height: 13px;
        }

        .column-subline-spacer {
            height: 13px;
            margin-top: 2px;
        }

        .column-count {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--accent-teal);
            background: color-mix(in srgb, var(--accent-teal) 15%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent-teal) 30%, transparent);
            padding: 1px 6px;
            border-radius: 8px;
            min-width: 20px;
            text-align: center;
            box-shadow: var(--glow-teal);
        }

        .column-select {
            background: #0a0a0a;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            font-family: var(--font-mono);
            font-size: 9px;
            padding: 2px 4px;
            outline: none;
            margin-right: 8px;
            margin-left: auto;
        }

        .column-select:hover,
        .column-select:focus {
            border-color: var(--border-bright);
            outline: none;
        }

        .column-body {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
            min-height: 120px;
            transition: background 0.15s;
        }

        .column-body.drag-over {
            background: color-mix(in srgb, var(--accent-teal) 6%, transparent);
            outline: 1px dashed var(--accent-teal-dim);
            outline-offset: -4px;
        }

        .kanban-card {
            /* Mix 12% teal into the top, fading to 4% teal at the bottom */
            background: linear-gradient(180deg, color-mix(in srgb, var(--accent-teal) 12%, var(--panel-bg2)) 0%, color-mix(in srgb, var(--accent-teal) 4%, var(--panel-bg)) 100%);
            border: 1px solid var(--vscode-contrastBorder, var(--border-color));
            border-left: 3px solid var(--accent-teal-dim);
            /* Persistent teal edge */
            border-radius: 3px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: grab;
            transition: all 0.15s;
            position: relative;
        }

        .kanban-card:active {
            cursor: grabbing;
        }

        .kanban-card:hover {
            border-color: color-mix(in srgb, var(--accent-teal) 50%, transparent);
            border-left-color: var(--accent-teal);
            /* Replace black shadow with a glowing teal bloom */
            box-shadow: 0 4px 12px color-mix(in srgb, var(--accent-teal) 20%, transparent);
        }

        .kanban-card.dragging {
            opacity: 0.4;
            border-color: var(--accent-teal-dim);
        }

        /* During drag, prevent child elements from interfering with drop targets */
        .column-body.drag-over .kanban-card,
        .column-body.drag-over .empty-state {
            pointer-events: none;
        }

        .card-topic {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-family: var(--font-mono);
            font-size: 9px;
            color: color-mix(in srgb, var(--text-secondary) 50%, var(--accent-teal-dim));
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .complexity-indicator {
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .complexity-indicator.high { color: #e06c75; }
        .complexity-indicator.low { color: #98c379; }
        .complexity-indicator.unknown { color: #7f848e; }

        .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .card-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 2px 6px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }

        .card-btn:hover {
            background: color-mix(in srgb, var(--text-secondary) 10%, transparent);
            border-color: var(--border-bright);
            color: var(--text-primary);
        }

        .card-btn.complete:hover {
            border-color: var(--accent-teal-dim);
            color: var(--accent-teal);
        }

        .empty-state {
            text-align: center;
            padding: 20px 10px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--vscode-scrollbarSlider-background, var(--border-bright));
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--vscode-scrollbarSlider-hoverBackground, var(--text-secondary));
        }

        /* Card Drop Animation */
        @keyframes dropPulse {
            0% { transform: scale(1.05); box-shadow: 0 4px 20px var(--accent-teal); }
            100% { transform: scale(1); box-shadow: 0 4px 12px color-mix(in srgb, var(--accent-teal) 20%, transparent); }
        }
        .card-dropped {
            animation: dropPulse 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Card Complete / Delete Animation */
        @keyframes cardComplete {
            0% { transform: scale(1); opacity: 1; }
            40% { transform: scale(1.05); opacity: 0.9; background: color-mix(in srgb, var(--accent-teal) 20%, var(--panel-bg)); border-color: var(--accent-teal); }
            100% { transform: scale(0.8) translateX(40px); opacity: 0; padding-top: 0; padding-bottom: 0; margin: 0; height: 0; border-width: 0; }
        }
        .card-completing {
            animation: cardComplete 0.4s ease-out forwards;
            pointer-events: none;
            overflow: hidden;
        }

        /* Autoban Read-Only Status Bar */
        .autoban-status-bar {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            background: var(--panel-bg2);
            border-bottom: 1px solid var(--border-color);
            font-family: var(--font-mono);
            font-size: 9px;
            min-height: 22px;
        }

        .autoban-indicator {
            color: var(--text-secondary);
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .autoban-indicator.is-active {
            color: var(--accent-teal);
        }

        @keyframes autobanPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .autoban-indicator.is-active::before {
            content: '⚡ ';
            animation: autobanPulse 2s ease-in-out infinite;
        }
    </style>
</head>

    <body>
    <div class="kanban-header">
        <div class="kanban-title" id="kanban-title">⚡ CLI-BAN - Drag plan cards to trigger CLI Agent actions | Copy prompts to send to external IDE agents</div>
    </div>
    <div class="controls-strip">
        <button class="strip-btn" id="btn-autoban" title="Toggle Autoban engine">⚡ AUTOBAN</button>
        <label class="cli-toggle" id="cli-toggle" title="When OFF, drag-drop moves cards without triggering CLI agent actions">
            <input type="checkbox" id="cli-triggers-toggle" checked>
            <span class="toggle-label">CLI Triggers</span>
        </label>
        <span class="triggers-off-badge" id="triggers-off-badge" hidden>⚠ TRIGGERS OFF</span>
        <button class="strip-btn" id="btn-batch-planner" title="Copy improve-plan prompt for all CREATED plans">📋 Batch Planner</button>
        <button class="strip-btn" id="btn-batch-low" title="Copy coding prompt for low-complexity PLAN REVIEWED plans">📋 Batch Low</button>
        <button class="strip-btn" id="btn-jules-low" title="Send low-complexity plans to Jules" style="display:none">🚀 Jules Low</button>
        <button class="strip-btn" id="btn-refresh-strip" title="Refresh board">↻ Refresh</button>
    </div>
    <div class="kanban-board" id="kanban-board"></div>

    <script>
        const vscode = acquireVsCodeApi();
        const kanbanBoard = document.getElementById('kanban-board');
        let columnDefinitions = [
            { id: 'CREATED', label: 'Plan Created', role: null, autobanEnabled: true },
            { id: 'PLAN REVIEWED', label: 'Plan Reviewed', role: 'planner', autobanEnabled: true },
            { id: 'CODED', label: 'Coded', role: null, autobanEnabled: true },
            { id: 'CODE REVIEWED', label: 'Code Reviewed', role: 'reviewer', autobanEnabled: false }
        ];
        let columns = columnDefinitions.map(col => col.id);
        let currentCards = [];
        let lastAgentNames = {};
        let lastVisibleAgents = { lead: true, coder: true, reviewer: true, planner: true, analyst: true, jules: true };
        let currentCodedTarget = 'lead';
        let cliTriggersEnabled = true;
        let autobanConfig = null; // Received from backend: { enabled, batchSize, rules }
        let autobanColumns = columnDefinitions.filter(col => col.autobanEnabled).map(col => col.id);
        let lastBoardSignature = '';

        function updateCliToggleUi() {
            const toggle = document.getElementById('cli-triggers-toggle');
            const toggleLabel = document.getElementById('cli-toggle');
            const offBadge = document.getElementById('triggers-off-badge');
            const titleEl = document.getElementById('kanban-title');
            if (toggle) {
                toggle.checked = !!cliTriggersEnabled;
            }
            if (toggleLabel) {
                toggleLabel.classList.toggle('is-off', !cliTriggersEnabled);
            }
            if (offBadge) {
                offBadge.hidden = !!cliTriggersEnabled;
            }
            if (titleEl) {
                titleEl.classList.toggle('triggers-off', !cliTriggersEnabled);
            }
        }

        function escapeAttr(value) {
            return String(value || '').replace(/"/g, '&quot;');
        }

        function getColumnDefinition(col) {
            return columnDefinitions.find(def => def.id === col) || null;
        }

        function buildBoardSignature(cards) {
            if (!Array.isArray(cards) || cards.length === 0) return '';
            return cards
                .map(card => `${card.sessionId}|${card.column}|${card.topic || ''}|${card.planFile || ''}|${card.complexity || 'Unknown'}`)
                .sort()
                .join('||');
        }

        function captureBoardViewState() {
            const columnScrollTop = {};
            columns.forEach(col => {
                const container = document.getElementById('col-' + col);
                if (container) columnScrollTop[col] = container.scrollTop;
            });
            return {
                boardScrollLeft: kanbanBoard.scrollLeft,
                pageScrollY: window.scrollY,
                columnScrollTop
            };
        }

        function restoreBoardViewState(viewState) {
            if (!viewState) return;
            kanbanBoard.scrollLeft = viewState.boardScrollLeft || 0;
            columns.forEach(col => {
                const container = document.getElementById('col-' + col);
                if (container) container.scrollTop = viewState.columnScrollTop[col] || 0;
            });
            window.scrollTo(0, viewState.pageScrollY || 0);
        }

        function renderColumns() {
            kanbanBoard.innerHTML = columnDefinitions.map(def => {
                const isCreated = def.id === 'CREATED';
                const isCoded = def.id === 'CODED';
                const hasAgent = !isCreated;
                const rightSide = isCreated
                    ? `<div style="display: flex; align-items: center; gap: 8px; line-height: 1;">
                            <button class="btn-add-plan" id="btn-add-plan" title="Add Plan">+</button>
                            <span class="column-count" id="count-${escapeAttr(def.id)}">0</span>
                       </div>`
                    : isCoded
                        ? `<div style="display: flex; align-items: center; gap: 12px;">
                                <select id="coded-target-select" class="column-select">
                                    <option value="lead">Lead Coder</option>
                                    <option value="coder">Coder</option>
                                </select>
                                <span class="column-count" id="count-${escapeAttr(def.id)}">0</span>
                           </div>`
                        : `<span class="column-count" id="count-${escapeAttr(def.id)}">0</span>`;
                const subline = hasAgent
                    ? `<div class="column-agent" id="agent-${escapeAttr(def.id)}"></div>`
                    : `<div class="column-subline-spacer" aria-hidden="true"></div>`;
                const autoban = def.autobanEnabled
                    ? `<div class="autoban-status-bar" id="autoban-status-${escapeAttr(def.id)}">
                            <span class="autoban-indicator" id="autoban-indicator-${escapeAttr(def.id)}"></span>
                       </div>`
                    : `<div class="autoban-status-bar"></div>`;

                return `<div class="kanban-column" data-column="${escapeAttr(def.id)}">
                    <div class="column-header">
                        <div style="display:flex; flex-direction:column;">
                            <span class="column-name">${escapeHtml(def.label)}</span>
                            ${subline}
                        </div>
                        ${rightSide}
                    </div>
                    ${autoban}
                    <div class="column-body" id="col-${escapeAttr(def.id)}"></div>
                </div>`;
            }).join('');

            document.getElementById('btn-add-plan')?.addEventListener('click', () => {
                vscode.postMessage({ type: 'createPlan' });
            });

            const codedTargetSelect = document.getElementById('coded-target-select');
            if (codedTargetSelect) {
                codedTargetSelect.value = currentCodedTarget;
                codedTargetSelect.addEventListener('change', (e) => {
                    currentCodedTarget = e.target.value;
                    updateAllColumnAgents();
                    vscode.postMessage({ type: 'setColumnTarget', column: 'CODED', target: e.target.value });
                });
            }

            document.querySelectorAll('.column-body').forEach(container => {
                const col = container.id.replace(/^col-/, '');
                container.addEventListener('dragover', handleDragOver);
                container.addEventListener('dragenter', handleDragEnter);
                container.addEventListener('dragleave', handleDragLeave);
                container.addEventListener('drop', (e) => handleDrop(e, col));
            });
        }

        /** Map a kanban column to its assigned agent role. */
        function columnToRole(col) {
            if (col === 'CODED') return currentCodedTarget;
            const def = getColumnDefinition(col);
            return def ? (def.role || null) : null;
        }

        /** Check if a column's agent is visible (enabled). */
        function isColumnAgentVisible(col) {
            const role = columnToRole(col);
            if (!role) return true;
            return lastVisibleAgents[role] !== false;
        }

        /** Check if a column currently has an assigned agent command behind it. */
        function isColumnAgentAssigned(col) {
            const role = columnToRole(col);
            if (!role) return true;
            const name = lastAgentNames[role];
            return !!name && name !== 'No agent assigned';
        }

        function isColumnAgentAvailable(col) {
            return isColumnAgentVisible(col) && isColumnAgentAssigned(col);
        }

        function updateAllColumnAgents() {
            if (!lastAgentNames) return;

            columns.forEach(col => {
                const el = document.getElementById('agent-' + col);
                if (el) {
                    const role = columnToRole(col);
                    const name = lastAgentNames[role];
                    if (role && (lastVisibleAgents[role] === false || name === 'No agent assigned')) {
                        el.textContent = 'No agent assigned';
                        el.style.color = 'var(--vscode-editorWarning-foreground, #cca700)';
                        el.style.fontStyle = 'italic';
                    } else {
                        el.textContent = name || '';
                        el.style.color = '';
                        el.style.fontStyle = '';
                    }
                }
            });
        }

        function updateJulesButtonVisibility() {
            const julesBtn = document.getElementById('btn-jules-low');
            if (!julesBtn) return;
            julesBtn.style.display = lastVisibleAgents.jules === false ? 'none' : 'inline-flex';
        }

        function updateAutobanButtonState() {
            const autobanBtn = document.getElementById('btn-autoban');
            if (!autobanBtn) return;
            const isEnabled = !!(autobanConfig && autobanConfig.enabled);
            autobanBtn.classList.toggle('is-active', isEnabled);
        }

        function renderBoard(cards) {
            const viewState = captureBoardViewState();
            currentCards = cards;
            const buckets = {};
            columns.forEach(c => buckets[c] = []);

            cards.forEach(card => {
                const col = columns.includes(card.column) ? card.column : 'CREATED';
                buckets[col].push(card);
            });

            columns.forEach(col => {
                const container = document.getElementById('col-' + col);
                const countEl = document.getElementById('count-' + col);
                const items = buckets[col];
                if (!container || !countEl) return;
                countEl.textContent = items.length;

                if (items.length === 0) {
                    container.innerHTML = '<div class="empty-state">No plans</div>';
                } else {
                    container.innerHTML = items.map(card => createCardHtml(card)).join('');
                }
            });

            // Attach card-level event listeners
            document.querySelectorAll('.kanban-card').forEach(el => {
                el.addEventListener('dragstart', handleDragStart);
                el.addEventListener('dragend', handleDragEnd);
            });

            document.querySelectorAll('.card-btn.review').forEach(btn => {
                btn.addEventListener('click', () => {
                    vscode.postMessage({ type: 'reviewPlan', sessionId: btn.dataset.session });
                });
            });

            document.querySelectorAll('.card-btn.complete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const cardEl = e.target.closest('.kanban-card');
                    if (cardEl) {
                        // Optimistic UI: Animate out before sending to backend
                        cardEl.classList.add('card-completing');
                        setTimeout(() => {
                            vscode.postMessage({ type: 'completePlan', sessionId: btn.dataset.session });
                        }, 350); // Slightly less than 400ms to ensure smooth handoff to the backend redraw
                    } else {
                        // Fallback if DOM traversal fails
                        vscode.postMessage({ type: 'completePlan', sessionId: btn.dataset.session });
                    }
                });
            });

            document.querySelectorAll('.card-btn.copy').forEach(btn => {
                btn.addEventListener('click', () => {
                    btn.disabled = true;
                    const column = btn.closest('.kanban-column')?.dataset?.column;
                    vscode.postMessage({ type: 'copyPlanLink', sessionId: btn.dataset.session, column });
                });
            });

            requestAnimationFrame(() => restoreBoardViewState(viewState));
        }

        function createCardHtml(card) {
            const timeAgo = formatTimeAgo(card.lastActivity);
            const shortTopic = card.topic.length > 50 ? card.topic.substring(0, 47) + '...' : card.topic;
            const complexity = card.complexity || 'Unknown';
            const complexityClass = complexity.toLowerCase();
            let copyLabel = 'Copy Prompt';
            return `
                <div class="kanban-card" draggable="true" data-session="${card.sessionId}">
                    <div class="card-topic" title="${escapeHtml(card.topic)}">${escapeHtml(shortTopic)}</div>
                    <div class="card-meta">Complexity: <span class="complexity-indicator ${complexityClass}">${complexity}</span> · ${timeAgo}</div>
                    <div class="card-actions">
                        <button class="card-btn copy" data-session="${card.sessionId}">${copyLabel}</button>
                        <button class="card-btn review" data-session="${card.sessionId}">Ticket</button>
                        <button class="card-btn complete" data-session="${card.sessionId}">Complete</button>
                    </div>
                </div>`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatTimeAgo(iso) {
            if (!iso) return '';
            const diff = Date.now() - new Date(iso).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            return Math.floor(hrs / 24) + 'd ago';
        }

        // Drag & Drop handlers
        let draggedSessionId = null;

        function handleDragStart(e) {
            draggedSessionId = e.target.dataset.session;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedSessionId);
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.column-body').forEach(el => el.classList.remove('drag-over'));
            draggedSessionId = null;
        }

        function handleDragOver(e) {
            e.preventDefault();
            const col = e.currentTarget.closest('.kanban-column')?.dataset?.column;
            e.dataTransfer.dropEffect = (cliTriggersEnabled && col && !isColumnAgentAvailable(col)) ? 'none' : 'move';
        }

        function handleDragEnter(e) {
            e.preventDefault();
            const body = e.currentTarget;
            body.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            const body = e.currentTarget;
            // Only remove drag-over when actually leaving the column-body,
            // not when entering a child element within it.
            const related = e.relatedTarget;
            if (!related || !body.contains(related)) {
                body.classList.remove('drag-over');
            }
        }

        function handleDrop(e, targetColumn) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const sessionId = e.dataTransfer.getData('text/plain');
            if (!sessionId) return;

            // Reject drop if the target column has no active assignment
            if (cliTriggersEnabled && !isColumnAgentAvailable(targetColumn)) {
                const agentEl = document.getElementById('agent-' + targetColumn);
                if (agentEl) {
                    agentEl.style.transition = 'color 0.15s';
                    agentEl.style.color = 'var(--vscode-errorForeground, #f44747)';
                    setTimeout(() => {
                        agentEl.style.color = 'var(--vscode-editorWarning-foreground, #cca700)';
                    }, 800);
                }
                return;
            }

            // Find current column of the card
            const card = currentCards.find(c => c.sessionId === sessionId);
            if (!card || card.column === targetColumn) return;

            // Optimistic UI: move the card DOM element immediately
            const cardEl = document.querySelector(`.kanban-card[data-session="${sessionId}"]`);
            const targetBody = document.getElementById('col-' + targetColumn);
            if (cardEl && targetBody) {
                // Remove empty-state placeholder if present
                const emptyState = targetBody.querySelector('.empty-state');
                if (emptyState) emptyState.remove();
                targetBody.appendChild(cardEl);

                // Update source column: show empty-state if now empty
                const sourceBody = document.getElementById('col-' + card.column);
                if (sourceBody && sourceBody.querySelectorAll('.kanban-card').length === 0) {
                    sourceBody.innerHTML = '<div class="empty-state">No plans</div>';
                }

                // Update counts
                const srcCount = document.getElementById('count-' + card.column);
                const tgtCount = document.getElementById('count-' + targetColumn);
                if (srcCount) srcCount.textContent = String(Math.max(0, parseInt(srcCount.textContent) - 1));
                if (tgtCount) tgtCount.textContent = String(parseInt(tgtCount.textContent) + 1);

                // Update in-memory state
                card.column = targetColumn;

                // Trigger drop animation
                cardEl.classList.remove('card-dropped'); 
                void cardEl.offsetWidth; // Trigger reflow to restart animation
                cardEl.classList.add('card-dropped');
                cardEl.addEventListener('animationend', () => {
                    cardEl.classList.remove('card-dropped');
                }, { once: true });
            }

            // Optimistic UI: Delay backend update so animation finishes before DOM is wiped
            setTimeout(() => {
                vscode.postMessage({
                    type: 'triggerAction',
                    sessionId: sessionId,
                    targetColumn: targetColumn
                });
            }, 350);
        }

        // Listen for messages from the extension
        window.addEventListener('message', (event) => {
            const msg = event.data;
            switch (msg.type) {
                case 'updateBoard':
                    const nextCards = Array.isArray(msg.cards) ? msg.cards : [];
                    const nextBoardSignature = buildBoardSignature(nextCards);
                    if (nextBoardSignature !== lastBoardSignature) {
                        lastBoardSignature = nextBoardSignature;
                        renderBoard(nextCards);
                    } else {
                        currentCards = nextCards;
                    }
                    break;
                case 'updateColumns':
                    if (Array.isArray(msg.columns) && msg.columns.length > 0) {
                        columnDefinitions = msg.columns;
                        columns = columnDefinitions.map(col => col.id);
                        autobanColumns = columnDefinitions.filter(col => col.autobanEnabled).map(col => col.id);
                        lastBoardSignature = '';
                        renderColumns();
                        renderBoard(currentCards);
                        updateAllColumnAgents();
                        updateAutobanIndicators();
                    }
                    break;
                case 'updateTarget':
                    if (msg.column === 'CODED' && msg.target) {
                        const selectEl = document.getElementById('coded-target-select');
                        if (selectEl) selectEl.value = msg.target;
                        currentCodedTarget = msg.target;
                        updateAllColumnAgents();
                    }
                    break;
                case 'updateAgentNames':
                    lastAgentNames = msg.agentNames || {};
                    updateAllColumnAgents();
                    break;
                case 'cliTriggersState':
                    cliTriggersEnabled = msg.enabled !== false;
                    updateCliToggleUi();
                    break;
                case 'visibleAgents':
                    if (msg.agents) {
                        lastVisibleAgents = { ...lastVisibleAgents, ...msg.agents };
                        updateAllColumnAgents();
                        updateJulesButtonVisibility();
                    }
                    break;
                case 'copyPlanLinkResult':
                    const btn = document.querySelector(`.card-btn.copy[data-session="${msg.sessionId}"]`);
                    if (btn) {
                        if (msg.success) {
                            const originalText = btn.textContent;
                            btn.textContent = 'Copied!';
                            const originalBg = btn.style.backgroundColor;
                            const originalColor = btn.style.color;
                            btn.style.backgroundColor = 'var(--vscode-testing-iconPassed, #73c991)';
                            btn.style.color = 'var(--vscode-editor-background, #1e1e1e)';
                            setTimeout(() => {
                                btn.textContent = originalText;
                                btn.style.backgroundColor = originalBg;
                                btn.style.color = originalColor;
                                btn.disabled = false;
                            }, 1500);
                        } else {
                            btn.disabled = false;
                        }
                    }
                    break;
                case 'updateAutobanConfig':
                    autobanConfig = msg.state || null;
                    updateAutobanIndicators();
                    updateAutobanButtonState();
                    break;
            }
        });

        /** Format seconds as MM:SS */
        function formatCountdown(secs) {
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        /** Update all autoban status indicators based on current config. */
        function updateAutobanIndicators() {
            autobanColumns.forEach(col => {
                const indicator = document.getElementById('autoban-indicator-' + col);
                if (!indicator) return;

                if (!autobanConfig || !autobanConfig.enabled) {
                    indicator.textContent = '';
                    indicator.className = 'autoban-indicator';
                    return;
                }

                const rule = autobanConfig.rules && autobanConfig.rules[col];
                if (rule && rule.enabled) {
                    indicator.textContent = `Auto: ${rule.intervalMinutes}m (Batch: ${autobanConfig.batchSize})`;
                    indicator.className = 'autoban-indicator is-active';
                } else {
                    indicator.textContent = 'Auto: off';
                    indicator.className = 'autoban-indicator';
                }
            });
            updateAutobanButtonState();
        }

        document.getElementById('btn-autoban')?.addEventListener('click', () => {
            const currentlyEnabled = !!(autobanConfig && autobanConfig.enabled);
            vscode.postMessage({ type: 'toggleAutoban', enabled: !currentlyEnabled });
        });
        document.getElementById('btn-batch-planner')?.addEventListener('click', () => {
            vscode.postMessage({ type: 'batchPlannerPrompt' });
        });
        document.getElementById('btn-batch-low')?.addEventListener('click', () => {
            vscode.postMessage({ type: 'batchLowComplexity' });
        });
        document.getElementById('btn-jules-low')?.addEventListener('click', () => {
            vscode.postMessage({ type: 'julesLowComplexity' });
        });
        document.getElementById('btn-refresh-strip').addEventListener('click', () => {
            vscode.postMessage({ type: 'refresh' });
        });
        document.getElementById('cli-triggers-toggle').addEventListener('change', (event) => {
            const checked = !!event.target?.checked;
            cliTriggersEnabled = checked;
            updateCliToggleUi();
            vscode.postMessage({ type: 'toggleCliTriggers', enabled: checked });
        });

        updateCliToggleUi();
        renderColumns();
        renderBoard([]);
        updateJulesButtonVisibility();
        updateAutobanButtonState();
    </script>
</body>

</html>
