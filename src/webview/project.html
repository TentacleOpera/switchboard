    <title>Switchboard Project Management</title>
    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes skeleton-shimmer {
            0% { background-position: -200px 0; }
            100% { background-position: calc(200px + 100%) 0; }
        }
        @font-face {
            font-family: 'GeistPixel';
            src: url('{{GEIST_PIXEL_FONT_URI}}') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Hanken Grotesk';
            src: url('{{HANKEN_FONT_URI}}') format('woff2');
            font-weight: 100 900;
            font-display: swap;
        }
        @font-face {
            font-family: 'Poppins';
            src: url('{{POPPINS_SEMIBOLD_FONT_URI}}') format('woff2');
            font-weight: 600;
            font-display: swap;
        }
        @font-face {
            font-family: 'Poppins';
            src: url('{{POPPINS_BOLD_FONT_URI}}') format('woff2');
            font-weight: 700;
            font-display: swap;
        }
        :root {
            --kanban-bg: #000000;
            --panel-bg: #000000;
            --panel-bg2: #0a0a0a;
            --border-color: #333333;
            --border-bright: #444444;
            --accent-primary: #00e5ff;
            --accent-teal: var(--accent-primary);
            --accent-teal-dim: color-mix(in srgb, var(--accent-teal) 40%, transparent);
            --accent-teal-bright: #5ce8e6;
            --accent-orange: #d18616;
            --accent-neon: var(--accent-teal);
            --glow-teal: 0 0 10px color-mix(in srgb, var(--accent-teal) 50%, transparent);
            --display-font: 'GeistPixel';
            --display-letter-spacing: -0.05em;
            --display-font-stretch: 90%;
            --card-bg: #0d0d0d;
            --card-bg-hover: #1a1a1a;
            --card-border: 1px solid #333333;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --font-family: 'Hanken Grotesk', var(--vscode-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
            --font-mono: var(--vscode-editor-font-family, 'SF Mono', Monaco, 'Cascadia Code', monospace);
            --spacing-unit: 8px;
            --spacing-xs: calc(var(--spacing-unit) / 2);
            --spacing-sm: var(--spacing-unit);
            --spacing-md: calc(var(--spacing-unit) * 1.5);
            --spacing-lg: calc(var(--spacing-unit) * 2);
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.25);
        }
        body.theme-claudify {
            --accent-primary: #D97757;
            --display-font: 'Poppins';
            --display-letter-spacing: normal;
            --display-font-stretch: 100%;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: var(--font-family);
            font-size: 13px;
            color: var(--text-primary);
            background: var(--panel-bg);
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
        }
        .controls-strip, .kanban-controls-strip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--panel-bg2);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .kanban-controls-strip select, .controls-strip select, .controls-strip input {
            background: #111;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: var(--font-mono);
        }
        .sidebar-search-input {
            margin-left: auto;
            width: 150px;
            background: #111;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        .strip-btn, .planning-button {
            background: #111;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .strip-btn:hover:not(:disabled), .planning-button:hover:not(:disabled) {
            background: var(--card-bg-hover);
            border-color: var(--accent-teal);
        }
        .strip-btn:disabled, .planning-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .content-row {
            display: flex;
            flex: 1;
            overflow: hidden;
            height: 100%;
        }
        #kanban-list-pane, #epics-list-pane, #constitution-list-pane {
            width: 320px;
            flex-shrink: 0;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: var(--panel-bg);
        }
        .preview-panel-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .kanban-preview-pane, .epics-preview-pane, .constitution-preview-pane {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--panel-bg);
        }
        .markdown-editor {
            width: 100%;
            height: 100%;
            background: #000;
            color: #ccc;
            font-family: var(--font-mono);
            font-size: 12px;
            border: none;
            padding: 12px;
            resize: none;
            outline: none;
            display: none;
        }
        .edit-mode .markdown-editor {
            display: block;
        }
        .edit-mode #kanban-preview-content, 
        .edit-mode #epics-preview-content, 
        .edit-mode #constitution-preview-content {
            display: none;
        }
        /* Active Doc Banner */
        .active-doc-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: color-mix(in srgb, var(--accent-orange) 15%, #000);
            border-bottom: 1px solid color-mix(in srgb, var(--accent-orange) 30%, transparent);
            color: #d18616;
            font-size: 11px;
            font-family: var(--font-mono);
        }
        .active-doc-banner.inactive {
            display: none;
        }
        .btn-disable-doc {
            background: transparent;
            border: 1px solid #d18616;
            color: #d18616;
            padding: 2px 8px;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-disable-doc:hover {
            background: rgba(209, 134, 22, 0.1);
        }
        /* Empty State */
        .kanban-empty-state, .empty-state {
            padding: 32px;
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
        }
        /* Kanban specific plan items */
        .kanban-plan-item, .epic-plan-item, .constitution-file-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.15s;
        }
        .kanban-plan-item:hover, .epic-plan-item:hover, .constitution-file-item:hover {
            background: var(--card-bg-hover);
        }
        .kanban-plan-item.selected, .epic-plan-item.selected, .constitution-file-item.selected {
            background: color-mix(in srgb, var(--accent-teal) 8%, #0f0f0f);
            border-left: 3px solid var(--accent-teal);
        }
        .kanban-plan-meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .kanban-plan-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .kanban-column-badge {
            font-size: 10px;
            background: #222;
            color: #aaa;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .kanban-column-badge.clickable {
            cursor: pointer;
        }
        .kanban-column-badge.clickable:hover {
            background: #333;
            color: #fff;
        }
        .kanban-plan-copy-link, .kanban-plan-copy-prompt {
            font-size: 10px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
        }
        .kanban-plan-copy-link:hover, .kanban-plan-copy-prompt:hover {
            border-color: var(--accent-teal);
            color: var(--text-primary);
        }
        .complexity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .complexity-dot.very-low { background: #4caf50; }
        .complexity-dot.low { background: #8bc34a; }
        .complexity-dot.medium { background: #ffeb3b; }
        .complexity-dot.high { background: #ff9800; }
        .complexity-dot.very-high { background: #f44336; }
        .complexity-dot.unknown { background: #9e9e9e; }
        /* Metadata preview bar */
        #kanban-preview-meta-bar, #epic-preview-meta-bar {
            display: flex;
            gap: 16px;
            padding: 8px 16px;
            background: var(--panel-bg2);
            border-bottom: 1px solid var(--border-color);
            font-size: 11px;
        }
        .kanban-meta-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .kanban-meta-label {
            color: var(--text-secondary);
        }
        .kanban-meta-value {
            color: var(--text-primary);
            cursor: pointer;
        }
        .sidebar-toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: var(--panel-bg2);
            border-bottom: 1px solid var(--border-color);
        }
        .sidebar-folders-btn, .sidebar-toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
        }
        .sidebar-folders-btn:hover, .sidebar-toggle-btn:hover {
            color: var(--text-primary);
        }
        /* Overlay and modals for logs */
        .kanban-log-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .kanban-log-modal {
            background: #111;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            width: 500px;
            max-width: 90vw;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .kanban-log-entries {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .kanban-log-entry {
            margin-bottom: 12px;
            font-size: 11px;
            line-height: 1.4;
        }
        .kanban-log-timestamp { color: var(--text-secondary); }
        .kanban-log-workflow { color: var(--accent-orange); font-weight: bold; }
        .kanban-log-close {
            padding: 8px;
            text-align: right;
            border-top: 1px solid var(--border-color);
        }
        /* Accordion for Epics */
        .epic-accordion {
            margin-top: 6px;
        }
        .epic-subtasks-list {
            padding-left: 12px;
            margin-top: 4px;
        }
        .epic-subtask-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-secondary);
            padding: 2px 0;
        }
        .epic-remove-subtask-btn {
            background: transparent;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 11px;
        }
        /* Shared tab bar + tab visibility (inlined to match planning.html/design.html;
           these are not shipped as a standalone stylesheet). */
        .shared-tab-bar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 8px 16px 0;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            overflow-y: hidden;
        }
        .shared-tab-btn {
            flex-shrink: 0;
            white-space: nowrap;
            background: transparent;
            border: 1px solid transparent;
            border-bottom: none;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 3px 3px 0 0;
            transition: all 0.15s;
            position: relative;
            top: 1px;
        }
        .shared-tab-btn:hover {
            color: var(--text-primary);
            background: color-mix(in srgb, var(--accent-teal) 5%, transparent);
        }
        .shared-tab-btn.active {
            color: var(--accent-teal);
            background: var(--panel-bg2);
            border-color: var(--border-color);
            border-bottom-color: var(--panel-bg2);
        }
        .shared-tab-content {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }
        .shared-tab-content.active {
            display: flex;
            overflow-y: auto;
        }
        .cyber-theme-enabled .shared-tab-btn.active {
            box-shadow: 0 -2px 8px color-mix(in srgb, var(--accent-teal) 30%, transparent);
        }
        .cyber-theme-enabled .shared-tab-bar {
            background: rgba(10, 10, 10, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* --- Cyber Theme Styles --- */
        .cyber-scanlines {
            display: none;
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.07) 2px,
                rgba(0, 0, 0, 0.07) 4px
            );
            z-index: 5;
        }
        .cyber-theme-enabled .cyber-scanlines { display: block; }

        .cyber-theme-enabled:not(.cyber-animation-disabled) .cyber-scanlines::before {
            content: " ";
            display: block;
            position: absolute;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 0%,
                color-mix(in srgb, var(--accent-primary) 3%, transparent) 10%,
                color-mix(in srgb, var(--accent-primary) 7%, transparent) 50%,
                color-mix(in srgb, var(--accent-primary) 3%, transparent) 90%,
                rgba(255, 255, 255, 0) 100%
            );
            width: 100%;
            height: 80px;
            pointer-events: none;
            z-index: 6;
            animation: scanline-sweep 8s linear infinite;
        }

        @keyframes scanline-sweep {
            0% { transform: translateY(-80px); }
            100% { transform: translateY(100vh); }
        }

        @media (prefers-reduced-motion: reduce) {
            .cyber-theme-enabled:not(.cyber-animation-disabled) .cyber-scanlines::before {
                animation: none;
                display: none;
            }
        }

        .preview-panel-wrapper.scanlines-suppressed > .cyber-scanlines {
            display: none !important;
        }

        body.cyber-theme-enabled {
            background-color: #101414;
            background-image:
                linear-gradient(color-mix(in srgb, var(--accent-primary) 4%, transparent) 1px, transparent 1px),
                linear-gradient(90deg, color-mix(in srgb, var(--accent-primary) 4%, transparent) 1px, transparent 1px);
            background-size: 40px 40px, 40px 40px;
        }

        .cyber-theme-enabled .controls-strip,
        .cyber-theme-enabled .kanban-controls-strip {
            background: rgba(10, 10, 10, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom-color: color-mix(in srgb, var(--accent-primary) 20%, transparent);
        }

        .cyber-theme-enabled #kanban-list-pane,
        .cyber-theme-enabled #epics-list-pane,
        .cyber-theme-enabled #constitution-list-pane {
            background: rgba(10, 10, 10, 0.70);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-right-color: color-mix(in srgb, var(--accent-primary) 20%, transparent);
        }

        .cyber-theme-enabled .preview-panel-wrapper {
            background: transparent;
            box-shadow: inset 0 0 30px color-mix(in srgb, var(--accent-teal) 6%, transparent);
        }

        .cyber-theme-enabled #kanban-preview-pane,
        .cyber-theme-enabled #epics-preview-pane,
        .cyber-theme-enabled #constitution-preview-pane {
            background-color: rgba(255, 255, 255, 0.015);
            background-image:
                linear-gradient(color-mix(in srgb, var(--accent-primary) 8%, transparent) 1px, transparent 1px),
                linear-gradient(90deg, color-mix(in srgb, var(--accent-primary) 8%, transparent) 1px, transparent 1px);
            background-size: 40px 40px, 40px 40px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        /* ── Cyber Panel Theme: Neon Glow Effects ── */
        .cyber-theme-enabled .preview-panel-wrapper h1 {
            text-shadow: 0 0 10px color-mix(in srgb, var(--accent-teal) 60%, transparent),
                         0 0 20px color-mix(in srgb, var(--accent-teal) 30%, transparent);
        }
        .cyber-theme-enabled .preview-panel-wrapper h2 {
            text-shadow: 0 0 8px color-mix(in srgb, var(--accent-teal) 50%, transparent),
                         0 0 16px color-mix(in srgb, var(--accent-teal) 25%, transparent);
        }
        .cyber-theme-enabled .preview-panel-wrapper h3 {
            text-shadow: 0 0 6px color-mix(in srgb, var(--accent-teal) 40%, transparent);
        }

        /* Inline code: neon glow */
        .cyber-theme-enabled #kanban-preview-content code,
        .cyber-theme-enabled #epics-preview-content code,
        .cyber-theme-enabled #constitution-preview-content code {
            box-shadow: 0 0 6px color-mix(in srgb, var(--accent-teal) 25%, transparent);
        }

        /* Code blocks: subtle glow border */
        .cyber-theme-enabled #kanban-preview-content pre,
        .cyber-theme-enabled #epics-preview-content pre,
        .cyber-theme-enabled #constitution-preview-content pre {
            box-shadow: 0 0 8px color-mix(in srgb, var(--accent-teal) 15%, transparent),
                         inset 0 0 12px rgba(0, 0, 0, 0.3);
        }

        /* Blockquotes: glowing left border */
        .cyber-theme-enabled #kanban-preview-content blockquote,
        .cyber-theme-enabled #epics-preview-content blockquote,
        .cyber-theme-enabled #constitution-preview-content blockquote {
            border-left-color: var(--accent-teal);
            box-shadow: -4px 0 8px color-mix(in srgb, var(--accent-teal) 15%, transparent);
        }

        /* Controls strip buttons: glow on hover */
        .cyber-theme-enabled .strip-btn:hover:not(:disabled) {
            box-shadow: var(--glow-teal);
        }

        /* Unified Markdown Preview Styling (Kanban, Epics & Constitution) */
        #kanban-preview-content,
        #epics-preview-content,
        #constitution-preview-content {
            flex: 1;
            width: 100%;
            box-sizing: border-box;
            margin: 0;
            font-family: var(--font-family);
            font-size: 13px;
            line-height: 1.5;
            word-wrap: break-word;
            color: var(--vscode-editor-foreground, #cccccc);
        }

        #kanban-preview-content h1, #kanban-preview-content h2, #kanban-preview-content h3, #kanban-preview-content h4, #kanban-preview-content h5, #kanban-preview-content h6,
        #epics-preview-content h1, #epics-preview-content h2, #epics-preview-content h3, #epics-preview-content h4, #epics-preview-content h5, #epics-preview-content h6,
        #constitution-preview-content h1, #constitution-preview-content h2, #constitution-preview-content h3, #constitution-preview-content h4, #constitution-preview-content h5, #constitution-preview-content h6 {
            margin-top: 24px;
            margin-bottom: 12px;
            font-weight: 600;
            line-height: 1.25;
            color: #ffffff;
        }

        /* Cyber theme — display heading typography */
        body.cyber-theme-enabled #kanban-preview-content h1, body.cyber-theme-enabled #kanban-preview-content h2, body.cyber-theme-enabled #kanban-preview-content h3, body.cyber-theme-enabled #kanban-preview-content h4, body.cyber-theme-enabled #kanban-preview-content h5, body.cyber-theme-enabled #kanban-preview-content h6,
        body.cyber-theme-enabled #epics-preview-content h1, body.cyber-theme-enabled #epics-preview-content h2, body.cyber-theme-enabled #epics-preview-content h3, body.cyber-theme-enabled #epics-preview-content h4, body.cyber-theme-enabled #epics-preview-content h5, body.cyber-theme-enabled #epics-preview-content h6,
        body.cyber-theme-enabled #constitution-preview-content h1, body.cyber-theme-enabled #constitution-preview-content h2, body.cyber-theme-enabled #constitution-preview-content h3, body.cyber-theme-enabled #constitution-preview-content h4, body.cyber-theme-enabled #constitution-preview-content h5, body.cyber-theme-enabled #constitution-preview-content h6 {
            font-family: var(--display-font), var(--font-family);
            letter-spacing: var(--display-letter-spacing);
            font-stretch: var(--display-font-stretch);
            line-height: 1.1;
        }
        /* Cyber theme — doc preview h2-h6 use accent color */
        body.cyber-theme-enabled #kanban-preview-content h2, body.cyber-theme-enabled #kanban-preview-content h3, body.cyber-theme-enabled #kanban-preview-content h4, body.cyber-theme-enabled #kanban-preview-content h5, body.cyber-theme-enabled #kanban-preview-content h6,
        body.cyber-theme-enabled #epics-preview-content h2, body.cyber-theme-enabled #epics-preview-content h3, body.cyber-theme-enabled #epics-preview-content h4, body.cyber-theme-enabled #epics-preview-content h5, body.cyber-theme-enabled #epics-preview-content h6,
        body.cyber-theme-enabled #constitution-preview-content h2, body.cyber-theme-enabled #constitution-preview-content h3, body.cyber-theme-enabled #constitution-preview-content h4, body.cyber-theme-enabled #constitution-preview-content h5, body.cyber-theme-enabled #constitution-preview-content h6 {
            color: var(--accent-primary);
        }

        #kanban-preview-content h1,
        #epics-preview-content h1,
        #constitution-preview-content h1 {
            font-size: 2em; /* 2em relative to 13px base = 26px */
            margin-top: 0;
            padding-bottom: 0.3em;
            border-bottom: 1px solid var(--accent-teal-dim);
            border-left: 3px solid var(--accent-teal-dim);
            padding-left: 8px;
            text-transform: uppercase;
        }

        #kanban-preview-content h2,
        #epics-preview-content h2,
        #constitution-preview-content h2 {
            font-size: 1.5em; /* 1.5em relative to 13px base = 19.5px */
            padding-bottom: 0.3em;
            border-bottom: 1px solid var(--accent-teal-dim);
            border-left: 2px solid var(--accent-teal-dim);
            padding-left: 6px;
            text-transform: uppercase;
            color: var(--accent-teal);
        }

        #kanban-preview-content h3,
        #epics-preview-content h3,
        #constitution-preview-content h3,
        #kanban-preview-content h4,
        #epics-preview-content h4,
        #constitution-preview-content h4,
        #kanban-preview-content h5,
        #epics-preview-content h5,
        #constitution-preview-content h5,
        #kanban-preview-content h6,
        #epics-preview-content h6,
        #constitution-preview-content h6 {
            text-transform: uppercase;
            color: var(--accent-teal);
        }

        #kanban-preview-content h3,
        #epics-preview-content h3,
        #constitution-preview-content h3 {
            font-size: 1.25em; /* 1.25em relative to 13px base = 16.25px */
        }

        #kanban-preview-content h4,
        #epics-preview-content h4,
        #constitution-preview-content h4 {
            font-size: 1em;
        }

        #kanban-preview-content h5,
        #epics-preview-content h5,
        #constitution-preview-content h5 {
            font-size: 0.875em;
        }

        #kanban-preview-content h6,
        #epics-preview-content h6,
        #constitution-preview-content h6 {
            font-size: 0.85em;
        }

        #kanban-preview-content p,
        #epics-preview-content p,
        #constitution-preview-content p {
            margin-bottom: 16px;
            line-height: inherit; /* Inherits from container's 1.5 */
            color: var(--text-primary, #e0e0e0);
            font-size: inherit; /* Inherits from container's 13px */
        }

        #kanban-preview-content li,
        #epics-preview-content li,
        #constitution-preview-content li {
            margin-bottom: 6px; /* Tighter list item spacing */
            line-height: inherit;
            color: var(--vscode-editor-foreground, #cccccc);
            font-size: inherit;
        }

        #kanban-preview-content li p,
        #epics-preview-content li p,
        #constitution-preview-content li p {
            margin-bottom: 0; /* Paragraphs inside list items: zero extra margin (li already spaced) */
        }

        #kanban-preview-content pre,
        #epics-preview-content pre,
        #constitution-preview-content pre {
            background-color: var(--vscode-textCodeBlock-background, rgba(255,255,255,0.04));
            border: 1px solid var(--vscode-widget-border, rgba(127, 127, 127, 0.35));
            border-radius: 3px;
            overflow-x: auto;
            padding: 16px; /* VS Code default */
            margin: 16px 0;
        }

        #kanban-preview-content pre code,
        #epics-preview-content pre code,
        #constitution-preview-content pre code {
            background: none;
            padding: 0;
            border: none;
            display: inline-block;
            color: var(--vscode-editor-foreground, #cccccc);
            tab-size: 4;
        }

        #kanban-preview-content code,
        #epics-preview-content code,
        #constitution-preview-content code {
            font-family: var(--vscode-editor-font-family, 'SF Mono', Monaco, Menlo, Consolas, monospace);
            font-size: 1em; /* Match VS Code: inline code is same size as surrounding text */
            line-height: 1.357em;
            color: var(--accent-teal);
            background-color: color-mix(in srgb, var(--accent-teal) 12%, transparent);
            border: 1px solid var(--accent-teal-dim);
            padding: 2px 6px;
            border-radius: 3px;
        }

        #kanban-preview-content blockquote,
        #epics-preview-content blockquote,
        #constitution-preview-content blockquote {
            margin: 0;
            padding: 0 16px 0 10px; /* Match VS Code's markdown.css */
            border-left: 5px solid var(--vscode-textBlockQuote-border, var(--border-color));
            border-radius: 2px;
            color: var(--vscode-editor-foreground, var(--text-secondary));
            background: transparent;
        }

        #kanban-preview-content ul, #kanban-preview-content ol,
        #epics-preview-content ul, #epics-preview-content ol,
        #constitution-preview-content ul, #constitution-preview-content ol {
            margin-bottom: 16px; /* Match VS Code's tighter list spacing */
            padding-left: 2em;
        }

        /* Table Styling */
        #kanban-preview-content table,
        #epics-preview-content table,
        #constitution-preview-content table {
            border-collapse: collapse;
            margin-bottom: 0.7em;
            font-size: inherit; /* Inherits from container */
        }

        #kanban-preview-content th,
        #epics-preview-content th,
        #constitution-preview-content th {
            text-align: left;
            border-bottom: 1px solid var(--vscode-widget-border, rgba(255, 255, 255, 0.69));
            font-weight: 600;
            padding: 5px 10px;
        }

        #kanban-preview-content td,
        #epics-preview-content td,
        #constitution-preview-content td {
            padding: 5px 10px;
            border-top: 1px solid var(--vscode-widget-border, rgba(255, 255, 255, 0.18));
            color: var(--vscode-editor-foreground, var(--text-primary));
        }

        #kanban-preview-content tr:hover td,
        #epics-preview-content tr:hover td,
        #constitution-preview-content tr:hover td {
            background: var(--vscode-list-hoverBackground, var(--card-bg-hover));
        }

        #kanban-preview-content .table-wrapper,
        #epics-preview-content .table-wrapper,
        #constitution-preview-content .table-wrapper {
            overflow-x: auto;
            max-width: 100%;
            margin-bottom: 16px;
        }

        /* Subtle, Interactive Links */
        #kanban-preview-content a,
        #epics-preview-content a,
        #constitution-preview-content a {
            color: var(--vscode-textLink-foreground, var(--accent-teal));
            text-decoration: none;
        }

        #kanban-preview-content a:hover,
        #epics-preview-content a:hover,
        #constitution-preview-content a:hover {
            color: var(--vscode-textLink-activeForeground, var(--accent-teal-bright));
            text-decoration: underline;
        }

        #kanban-preview-content hr,
        #epics-preview-content hr,
        #constitution-preview-content hr {
            border: 0;
            height: 1px;
            border-bottom: 1px solid var(--vscode-widget-border, rgba(255, 255, 255, 0.18));
        }

        #kanban-preview-content img,
        #epics-preview-content img,
        #constitution-preview-content img {
            max-width: 100%;
            max-height: 100%;
            position: relative;
            z-index: 7; /* Above .cyber-scanlines (z-index: 5) and sweep animation to prevent overlay distortion */
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.4); /* Intentional elevation so the pop-out above scanlines looks designed */
        }

        #kanban-preview-content .empty-state,
        #epics-preview-content .empty-state,
        #constitution-preview-content .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--vscode-editor-foreground, var(--text-secondary));
            font-size: inherit; /* Inherits from container's 14px */
            opacity: 0.5;
        }

        /* ── Cyber Theme: missing overrides from planning.html ── */
        .cyber-theme-enabled .kanban-controls-strip {
            background: transparent;
        }

        .cyber-theme-enabled .markdown-editor {
            background: transparent;
        }
    </style>
</head>
<body class="cyber-theme-enabled">
    <div class="shared-tab-bar">
        <button class="shared-tab-btn active" data-tab="kanban">KANBAN PLANS</button>
        <button class="shared-tab-btn" data-tab="epics">EPICS</button>
        <button class="shared-tab-btn" data-tab="constitution">CONSTITUTION</button>
    </div>
    <div class="container">
        <!-- Kanban tab -->
        <div id="kanban-content" class="shared-tab-content active">
            <div class="kanban-controls-strip">
                <select id="kanban-workspace-filter">
                    <option value="">All Workspaces</option>
                </select>
                <select id="kanban-project-filter">
                    <option value="">All Projects</option>
                </select>
                <select id="kanban-column-filter">
                    <option value="">All Columns</option>
                </select>
                <button id="btn-import-kanban-plans" class="strip-btn" title="Scan configured AI IDE folders and pick unclaimed plans to add">Import</button>
                <button id="btn-edit-kanban" class="strip-btn" disabled>Edit</button>
                <button id="btn-save-kanban" class="strip-btn" style="display:none;">Save</button>
                <button id="btn-cancel-kanban" class="strip-btn" style="display:none;">Cancel</button>
                <input type="text" id="kanban-search" class="sidebar-search-input" placeholder="Search plans..." />
            </div>
            <div class="content-row">
                <div id="kanban-list-pane">
                    <div class="sidebar-toggle-row">
                        <button class="sidebar-toggle-btn" title="Toggle sidebar">«</button>
                    </div>
                </div>
                <div class="preview-panel-wrapper">
                    <div class="cyber-scanlines"></div>
                    <div id="kanban-preview-pane" class="kanban-preview-pane">
                        <div id="kanban-preview-meta-bar" style="display:none;"></div>
                        <div id="kanban-preview-content"></div>
                        <textarea id="kanban-editor" class="markdown-editor"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- Epics tab -->
        <div id="epics-content" class="shared-tab-content">
            <div class="active-doc-banner inactive" id="active-epic-banner">
                <div class="active-doc-info">
                    <span class="active-doc-label">Active Planning Epic:</span>
                    <span class="active-doc-name" id="active-epic-name">None</span>
                </div>
                <button class="btn-disable-doc" id="btn-disable-epic">Turn off</button>
            </div>
            <div class="controls-strip">
                <select id="epics-workspace-filter">
                    <option value="">All Workspaces</option>
                </select>
                <button id="btn-set-active-epic" class="strip-btn" disabled>Set as Active Planning Context</button>
            </div>
            <div class="content-row">
                <div id="epics-list-pane">
                    <div class="empty-state">Loading epics...</div>
                </div>
                <div class="preview-panel-wrapper">
                    <div class="cyber-scanlines"></div>
                    <div id="epics-preview-pane" class="epics-preview-pane">
                        <div id="epic-preview-meta-bar" style="display:none;"></div>
                        <div id="epics-preview-content">
                            <div class="kanban-empty-state">Select an epic to preview</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Constitution tab -->
        <div id="constitution-content" class="shared-tab-content">
            <div class="controls-strip">
                <button id="btn-build-constitution" class="strip-btn">Build Constitution</button>
                <button id="btn-edit-constitution" class="strip-btn" disabled>Edit</button>
                <button id="btn-save-constitution" class="strip-btn" style="display:none;">Save</button>
                <button id="btn-cancel-constitution" class="strip-btn" style="display:none;">Cancel</button>
            </div>
            <div class="content-row">
                <div id="constitution-list-pane">
                    <div class="empty-state">Loading workspaces...</div>
                </div>
                <div class="preview-panel-wrapper">
                    <div class="cyber-scanlines"></div>
                    <div id="constitution-preview-pane" class="constitution-preview-pane">
                        <div id="constitution-preview-content">
                            <div class="empty-state">Select a workspace to view its Constitution</div>
                        </div>
                        <textarea id="constitution-editor" class="markdown-editor"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script nonce="{{NONCE}}" src="{{SHARED_UTILS_URI}}"></script>
    <script nonce="{{NONCE}}" src="{{PROJECT_JS_URI}}"></script>
</body>
</html>
